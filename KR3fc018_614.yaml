body:
  text: 六十八為從二亷九十六為從三亷六百五十六為益四亷四十八為從隅五乘方開之合問今有五和併三事與四直積加二句等只云三事減五較與四相和常例五和五較四和者句股弦黃方減股羃同問句股弦和五事事連環得幾何答曰二十步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得七千六百八十為正實七萬五千五百八十四萬益方一十
