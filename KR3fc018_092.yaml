body:
  text: 今有積加和以積乘之得二千一百二十步只云長多于平三步問積幾何答曰四十步術曰立天元一為直積如積求之得四百四十九萬四千四百為正實四千二百四十九為益上廉四為益下廉一為正隅三乘方開之得積今有積加斜幂得三百三十三步只云併長平斜得三十六步問弦幾何答曰一十五步術曰立天元一為弦如積求之得三百一十五
