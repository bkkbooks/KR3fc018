body:
  text: 等只云長乘和減平與二積一較同問和羃弦羃較羃帶一積一長一平六事連環得幾何答曰九十四步術曰立天元一為句地元一為股人元一為開數三才相配求之得一百八十八為正實九十六為益方一為正隅平方開之合問今有長乘積減二平如平而一所得加二較如長而一減平與一較等只云長乘較減於直積餘以長而一與二較同問積
