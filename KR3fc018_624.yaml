body:
  text: 黃帝九章以降算經多矣不可枚舉唐宋設明算科立法取士不出九章周髀海島孫子張丘建夏侯陽五曹五經算緝古綴術數家而巳然天地人物四元罔有云及一者厥後平陽蔣周撰益古博陸李文一撰照膽底泉石信道撰鈴鈴經平水劉汝諧撰如積釋鎖絳終人元裕細草之後人始知有天元也丰陽李德載因撰兩儀群英集臻兼有地元霍山邢先生頌不髙弟劉大鑑潤夫撰乾坤括囊末僅有人元二問吾友
