body:
  text: 圎池徑七步方池靣八步術曰立天元一為圎池周如積求之得七千七百八十五萬五千一百二十六步八分為正實一千五十五萬三千七百三十四步四分為益方五十三萬二千三百一步五分為從上廉一萬一千八百八十為益下廉九十九為從隅三乘方開之得圎池周餘依加減求之合問今有方田一段內有方池池心復有方亭臺各占之三積共五千五十六尺只云併臺髙臺方為益實二從方一益廉
