body:
  text: 二十二為益實一為從方一為從隅立方開之得三角底靣合問今有三角四角果子各一所四角積內減三角積餘二十箇只云三角四角底靣和得一十五箇問各幾何答曰四角底靣七箇三角底靣八箇術曰立天元一為四角底子如積求之得一千四百為益實二百五十六為從方一十五為益廉一為正隅立方開之合問今有三角果子三所四角果子六所共積一
