body:
  text: 答曰長三十一步平一十二步術曰立天元一為四不等之元方靣如積求之得四百八十為正實二十八為從方二為益隅平方開之得二十四步又立天元一為平如積求之得七百四十四為益實一十四為從隅方八為益廉一為正隅立方開之合問今有圭田一段不云圭闊只云長五十步直錢五十四兩今從尖截闊一十二步直銀六兩問截長闊各幾何答曰截長十六步太半步截闊三十六步
