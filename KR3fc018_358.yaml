body:
  text: 答曰長三十一步平一十二步術曰立天元一爲四不等之元方靣如積求之得四百八十爲正實二十八爲従方二爲益隅平方開之得二十四步又立天元一爲平如積求之得七百四十四爲益實一十四爲從隅方八爲益㢘一爲正隅立方開之合問今有圭田一段不云圭闊只云長五十步直錢五十四兩今從尖截闊一十二步直銀六兩問截長闊各幾何答曰截長十六步太半步截闊三十六步
