body:
  text: 六百為正實一千六百三十六為益上亷一為正隅三乘方開之得黃方又立天元一為句股和如積求之得一千八百四十為正實八千十為益方開無隅平方除之合問今有直積一百八步只云句弦和乘股弦和得六百四十八步問黃方及弦各幾何答曰黃方六步弦一十五步術曰立天元一為黃方如積求之得二萬三千三百二十八為益實六百四十八為從隅平方開之得黃方六步又立天元一為弦如積求
  hash: sha256:da08acfecc7b33f1b4de4c190260426ef2633facfe64fa1e99095efff109091c
