body:
  text: 六百爲正實一千六百三十六爲益上亷一爲正隅三乗方開之得黄方又立天元一爲句股和如積求之得一千八百四十爲正實八千十爲益方開無隅平方除之合問今有直積一百八歩只云句弦和乗股弦和得六百四十八歩問黄方及弦各幾何答曰黄方六歩弦一十五歩術曰立天元一爲黄方如積求之得二萬三千三百二十八為益實六百四十八為從隅平方開之得黄方六歩又立天元一爲弦如積求
