body:
  text: 六尺却多上廣一丈一尺髙不及上內周一萬六千二百二十四尺令侵城撅壕取土築城定壕廣三丈問內外周髙及上下廣併濠深各得幾何答曰下外周九里三十步內周九里八步二尺廣一丈八尺上外周九里一十八步內周九里九步三尺廣七尺髙二丈四尺深一丈三尺二寸一萬二百七十五分三寸之七十四術曰立天元一為如城髙如積求之得四百八十八萬五千三百四十四為益實一十八萬六千九百四十八爲益方一萬六千二百四十七爲從亷一為正隅
