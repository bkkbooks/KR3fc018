body:
  text: 為益三廉二百七十七為益四廉四十為從下廉二十一為從隅六乘方開之得四步為開方數今有種金田積加對尖直長得三百一十五步只云外兩斜各長二十五步內兩斜各長二十步問對尖直各幾何答曰一十五步術曰立天元一為對尖直長如積求之得四十四萬七千五百二十五為益實二千五百二十為從方二千四十六為從上廉一為益隅三乘方開之得對尖直長合問
