body:
  text: 周太平與方箭外周弦平強半等問方圎周各幾何答曰圎周一十八隻方周一十六隻術曰立天元一為圎箭外周如積求之得一萬九千四百四十為益實三百六為從方四十三為從隅平方開之得圎周合問今有方圎箭各一朿共積二百八十一隻只云圎周四分之一及方周七分之五八隻問方圎周各幾何答曰方周二十八隻圎周四十八隻
