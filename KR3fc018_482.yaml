body:
  text: 之得數加入圎徑共得四十八步問三池積幾何答曰八百五十五步九十七分步之三十六術曰立天元一為開方數如積求之得一百三十八為益實一十七為從方五為益亷一為正隅立方開之得六步以減云數餘為圎田徑又立天元一為容圎池徑如積求之得五千二百九十二為益實二百五十二為從方一為正隅平方開之得池徑不盡命分求池積術曰列池徑通分內子自之於上分母分子
