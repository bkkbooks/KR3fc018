body:
  text: 一氣混元今有黃方乘直積得二十四步只云股弦和九步問句幾何答曰三步草曰立天元一為句如積求之得一百六十二箇黃方乘直積式以一百六十二乘元積相消得開方式四乘方開之得句三步合問細草曰立天元一為句自之太合以股弦和除之為股弦較今不受除即以
