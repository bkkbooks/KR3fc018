body:
  text: 上亷一為從隅三乘方開之合問今有直積一百二十步只云弦較較乘弦和較得六十步問黃方幾何答曰六步術曰立天元一為黃方如積求之得三十六為益實一為從隅平方開之合問今有直積一百六十八步只云句弦較乘弦和較得一百八步問句弦較幾何答曰一十八步術曰立天元一為句弦較如積求之得一萬四
