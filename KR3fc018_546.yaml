body:
  text: 術曰立天元一為股弦較地元一為股天地配合求之得三千六百為正實三千七百六為益方七十一為従上亷三十四為従下亷一為正隅三乗方開之合問今有句股積三十步只云句股和一十七步問弦和較幾何答曰四步術曰立天元一為弦和較地元一為句天地配合求之得一百二十為正實三十四為益方一為従隅平方開之合問
