body:
  text: 術曰立天元一為方田面如積求之得二億八千九百七十四萬四千一百二十八為益實一萬三千九百七十三為正隅三乘方開之合問今有方圎田各一假圎徔密率方田積內減方田面圎田積內減圎田周二餘數相乘得八千八百五十六步只云方面不及圎周二十四步問方面圎周各幾何答曰圎周三十六步方面一十二步術曰立天元一為圎田周如積求之得八百五十七萬二千六百八為益實五十八萬八百為
