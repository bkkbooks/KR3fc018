body:
  text: 盡者平地堆之只云倉長多于倉深七尺不及囤周二丈倉深却多平地乘粟髙三尺倉闊如倉長二分之一圓囤周髙和得四十八尺其平地粟髙自乘加入粟髙與粟周等問三事各得幾何答曰倉長一丈六尺闊八尺深九尺囤周三丈六尺髙一丈二尺粟周四丈二尺髙六尺術曰立天元一為倉深如積求之得五萬二千
