body:
  text: 答曰下外方一十里一十步內方一十里廣二丈五尺上外方一十里六步內方一十里二步廣一丈髙三丈六尺池深二丈五尺五寸二千四百六十七分寸之四百八十三興功五十一日一千一百二十五分日之四百七十三術曰立天元一為下廣如積求之得四十一萬二千三百四十八為益實一萬一千一百四十八步六分為從方一萬四千八百九十八步二分為從上亷一百三十一步八分為益下亷一為正隅三乗方開之得下廣余依加减求之求池深
