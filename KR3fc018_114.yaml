body:
  text: 今有梭田積加廣幂減于長幂不足三十六步只云長內虛加一算平方開之得數以減半廣不足四步問長廣各幾何答曰廣十八步術曰立天元一為廣半如積求之得一百八十九為正實二百五十五為益方九十八為從上廉一十七為益下廉一為正隅三乘方開之得半廣合問今有三斜田積減中股餘七十六步只云中斜多于中股九步中股不及小斜二步問
