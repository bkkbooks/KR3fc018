body:
  text: 子和得二十一箇問上下靣各幾何答云上靣七箇下靣一十四箇術曰立天元一為下靣底子如積求之得六千一百三十二為益實六百六十二為従方三十為益廉一為正隅立方開之合問今有四角臺果子積一千一百一十一箇只云上靣不及下靣五箇却多層数五箇問上下靣及髙各幾何答曰上靣一十一箇下靣一十六箇髙六層
