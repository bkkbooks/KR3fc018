body:
  text: 燕山朱漢卿先生演數有年探三之賾奈索九章之隱按天地人物立成四元以元氣居中立天句地股人弦物黃方考啚明之上升下降左進右退互通變化乘除往來用假象真以虛問實錯正負分成四式必以寄之剔之餘籌易位橫衡直撞精而不雜自然而然消而和會以成開方之式也書成名曰四元玉鑑釐為三卷以象三才四元以象其時分門二十有四以象其氣立問二百八十有八假象周天之數玉者比漢卿之德術動則其聲清越以長靜則夫尹旁達而不有隱翳鑑去照
  hash: sha256:c4e6a9f1dc80d7f3c53397d88d0976c89e2d00beb24b2e6342b7d40a99f38d82
