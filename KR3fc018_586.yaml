body:
  text: 十為益九亷八為從隅十乘方開之得句三步合法前問三才變通一十一問今有直積減弦較和加股弦較羃與弦較較羃等只云句羃減三相和與弦較和同問弦幾何答曰一十七步術曰立天元一為句地元一為股人元一為弦三才相配求之得三十四為正實一十九為益方一為正隅平方開之得弦合問
