body:
  text: 九十二為正實三百七十八為從方一百一十九為益隅平方開之合問今有三角四角果子積相乘得二萬三千一百箇只云併三角四角底靣平方開之不及四角底靣三箇問二底靣各幾何答曰四角底靣七箇三角底靣九箇術曰立天元一為四角底靣如積求之得八十三萬一千六百為益實九百九十為從方八百七十七為從上廉二千五百三十為益二廉三百五十八為從三廉一千四百二十六為從四
