body:
  text: 子一十三箇加二即日數米求日術曰立天元一為三角嵐峯底子如積求之得五千三百六十七萬四千九百二十為益實七萬三千三百八十六為従方三萬六千七百三十五為従上㢘七千九百五十為従二㢘七百五為従下㢘二十四為従隅四椉方開之得三角嵐峯底子一十三箇加二即日數合問求日術曰今有官司依立方招兵初招方面三尺次招方靣轉多一尺每人日支錢二百五十文已招二萬三千四百人支錢二萬三
