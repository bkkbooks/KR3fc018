body:
  text: 寓燕松庭朱世傑漢卿編述臨川琴屋鐘燁叔明較正直段求源十八問今有弦和和乘三相和加弦羃共得一百六十九步只云弦較較乘弦較和減股弦和乘股弦較餘一十五步問句幾何答曰三步術曰立天元一為句如積求之得二十五萬三千一百二十五為正實八十一萬八千一百為
