body:
  text: 術曰先以合分法求之後如方程正負術入之左行得長中行得小闊右行求大闊又梯積减共積餘為圭積立天元一為圭長如積求之得三萬三千七百六十八為益實一為正隅立方開之得圭長三十二步又立天元一為圭闊如積求之得五百一十二為益實一為從方立方開之得圭闊合問今有甲乙丙買絲各不知數甲云得乙絲三分之二丙絲三分之一滿二斤半乙云得甲絲三分之二丙絲二分之一
