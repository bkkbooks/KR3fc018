body:
  text: 答曰一十二朿術曰立天元一爲嵐峯底子如積求之得八萬八百八爲益實二爲従方九爲従上廉十爲従下廉三爲従隅三乘方開之合問今有茭草八千五百六十八朿欲令撒星更落一形埵之問底子幾何答曰一十四朿術曰立天元一爲撒星更落一底子如積求之得一百二萬八千一百六十爲積益實二十四爲從方五十爲従上㢘三十五爲從二㢘一十爲
