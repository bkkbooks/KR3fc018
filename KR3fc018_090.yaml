body:
  text: 術曰立天元一為平如積求之得九十四萬四千五十五為益實八十一為益方三萬九千二百四為從上廉三千九百六十為益下廉一百萬正隅三乘方開之得平合問今有積減較幂餘七十一步只云三相和四十步問長平和得幾何答曰二十三步術曰立天元一為長平和如積求之得四千七十七為益實二百為從方一為益隅平方開之得和合問
