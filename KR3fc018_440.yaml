body:
  text: 千二百七十二箇只云四角底靣乘三角底靣得四十八箇問各幾何答曰四角底靣四箇三角底靣十二箇術曰立天元一為四角底子如積求之得五萬五千二百九十六為正實三千四百五十六為從方四十八為從上廉一千二百七十二為益二廉一為從三廉三為從下廉二為從隅五乘方開之合問今有三角果子二所四角果子三所共積六百五十二箇只云三角底靣除四角
