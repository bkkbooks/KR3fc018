body:
  text: 羃和羃長羃平羃較羃帶一和二平三長四較九事連環得幾何答曰二百四十八步術曰立天元一為句地元一為股人元一為開數三才相配求之得七萬九十六百八為正實五百六十九為益方一為正隅平方開之合問今有直積减句股和以句乘之加句股較减直積以股除之加句股和以股乘之加股以句除之减二股一句股較與句等只云句乘股羃以股除之加直積减
