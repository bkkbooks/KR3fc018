body:
  text: 立圓徑如積求之得三百四十七萬三千五百三十六為正實六十四萬四千三百六十為益方一萬七千五十六為從亷六百三為從隅立方開之得立圓徑又立天元一為平方面如積求之得七百五萬五千八百二十五為正實七十一萬一千一百二十五為益方一萬三百三十七為從亷一百二十步為分為從隅立方開之得平方面又立天元一為立方面如積求之得二百二十五萬七千八百六十四為正實五十六萬八千九百為益方二萬六百七十四為從亷六百三為從隅立方開之得立方面
