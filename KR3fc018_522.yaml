body:
  text: 方六十三為正隅平方開之得顆價不盡按之分法求之合問今有人贖觧本利共收九貫八百五十文只云利錢平方開之加入本錢共得五貫六百九十文又開方數如日一百二十五分日之一十三月率三十文與日同問本利及日數每貫月利幾何答曰本五貫六百二十五文每貫月利三十六文七十五分文之四二十箇月零二十五日利四貫二百二十五文
