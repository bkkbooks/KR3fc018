body:
  text: 今有梯田一段小闊二十五步大闊六十五步正長一百六十步今從小闊截撥七畞一百一十二步問截長闊各幾何答曰截長五十六步闊三十九步術曰立天元一為截長如積求之得一萬四千三百三十六為益實二百為從方一為從隅平方開之得截長合問今有梯田一段大闊四十二步小闊一十八步正長一百二十步今從大闊截地十畞一百八十七步二分步之一問
