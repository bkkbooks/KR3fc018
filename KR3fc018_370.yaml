body:
  text: 今有句股田一段句闊五十七步股長九十五步今從句橫截地八畞三十七步半問截長闊各幾何答曰截長四十五步截闊三十步術曰立天元一爲截長如積求之得六千五百二十五爲正實一百九十爲益方一爲正隅平方開之得截長合問今有句股田一段句闊六十步股長一百五十步令甲乙丙三人分之甲截積二千九十步乙截積一千八百五十步
