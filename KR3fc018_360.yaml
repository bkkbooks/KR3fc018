body:
  text: 術曰立天元一為截長如積求之得二千五百為正實九為益隅平方開之得截長不盡按之分術求之合問今有梯田一段小闊一十二步大闊二十步直錢三十二貫文今從大頭截長四步直錢九貫五百文問截闊及元長各幾何答曰截闊一十八步元長一十六步術曰立天元一為截闊如積求之得三百二十四為正實一為益隅平方開之得截闊合問
