body:
  text: 廉七十二為從五廉六為益七廉一十八為正隅八乘方開之得二步即開方數六之得長今有積以和乘之減積餘以平求之加和得一十七萬七千一百六十二步只云和為益實四為益方三為從上廉二為益下廉一為正隅如平四分之一問長平各幾何答曰答平一十二步長三十步術曰立天元一為開方數如積求之得一十七萬七千一百六十二為益實四為益方三為從上廉一百二十六為從二廉四百六十五為從
