body:
  text: 今有立圎積九百二十八尺一百五十七分尺之一百四問為徽立圎周幾何答曰三丈六尺術曰立天元一為徽立圎周如積求之得四萬六千六百五十六為益實一為正隅立方開之得三千六尺合問今有立圎積九百二十七尺一十一分尺之九問為密立圎徑幾何答曰一丈二尺術曰立天元一為密立圎徑如積求之得三十
