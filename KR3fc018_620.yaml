body:
  text: 術曰立天元一為句地元一為股人元一為弦物元一為開數四象和㑹求之得一千一百五十二為正實七百六十八為益方六百四十為益上亷一千七百九十二為從二亷三百八十四為益三亷九千八為益四亷一萬九千一百一十二為從五亷八千七百九十九為益六亷八千七百九十五為益七亷一萬二千六百三十七為從八亷二千三十為從九亷一萬九千一百六十八為益十亷二萬二千二百九十二為從十一亷一萬一千一百一十二為益十二
