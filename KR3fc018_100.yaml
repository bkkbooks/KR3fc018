body:
  text: 荅曰荅平七步長四十二步術曰立天元一為平如積求之得七萬八千四百一十四為益實五為益方二十六為従上㢘二十為益二㢘一十四為従三㢘四為益下㢘一為正隅五椉方開之得平合問今有積加平以長中半椉之得三千九百步只云長以平方開之所得不及平七步問長平各幾何荅曰荅平一十二步長二十五步術曰立天元一為平如積求之得七千八百為
