body:
  text: 答曰答平七步長四十二步術曰立天元一為平如積求之得七萬八千四百一十四為益實五為益方二十六為從上廉二十為益二廉一十四為從三廉四為益下廉一為正隅五乘方開之得平合問今有積加平以長中半乘之得三千九百步只云長以平方開之所得不及平七步問長平各幾何答曰答平一十二步長二十五步術曰立天元一為平如積求之得七千八百為
