body:
  text: 今有營居山頂巖底有泉欲汲而不知其深偃矩山上令句髙四尺從句端望泉入下股六尺又設重矩於上其矩間相去一丈六尺更從句端望泉入上股五尺六寸問巖深幾何答曰巖深二十二丈術曰立天元一為巖深如積求之得二十二尺為正益實一寸為從方上實下法而一即巖深合問今有登山臨邑不知門髙偃矩山上令句髙三尺斜望門額入下股四尺八寸復望門
