body:
  text: 今有營居山頂巌底有泉欲汲而不知其深偃矩山上令句髙四尺従句端望泉入下股六尺又設重矩於上其矩間相去一丈六尺更從句端望泉入上股五尺六寸問巌深幾何答曰巌深二十二丈術曰立天元一爲巌深如積求之得二十二尺爲正益實一寸爲從方上實下法而一即巌深合問今有登山臨邑不知門髙偃矩山上令句髙三尺斜望門額入下股四尺八寸復望門
