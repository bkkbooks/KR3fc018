body:
  text: 今有直積一百二十步只云股弦和乘句弦較得二百八十八步問黃方幾何答曰六步術曰立天元一為半黃方如積求之得三千六百為正實四百九為益上亷一為從隅三乘方開之得半黃方面倍之合問今有直積一百二十步只云句弦和乘股弦較得五十步問黃方及句股和各幾何答曰黃方六步句股和二十三步術曰立天元一為黃方如積求之得五萬七千
