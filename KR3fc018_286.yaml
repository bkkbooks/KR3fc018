body:
  text: 今有直積一百二十歩只云股弦和乗句弦較得二百八十八歩問黄方幾何答曰六歩術曰立天元一爲半黄方如積求之得三千六百爲正實四百九爲益上亷一爲從隅三乗方開之得半黄方面倍之合問今有直積一百二十歩只云句弦和乗股弦較得五十歩問黄方及句股和各幾何答曰黄方六歩句股和二十三歩術曰立天元一爲黄方如積求之得五萬七千
