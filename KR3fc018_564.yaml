body:
  text: 之得一十八為正實二十七為益方四為從亷一為從隅立方開之得平合問今有直積加二平减三較餘一十五步只云長取強半平取少半與和七分之四等問長平各幾何答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得四十五為盗實三為從方四為從隅平方開之得平合問今有直積以長乗之用平除之所得减積如長而
