  text: 玉圎周七寸積六寸三百五十二分寸之二百八十九重二斤一十五兩一十七銖四十四分銖之四十一術曰立天元一為金圎周如積求之得五百三十六萬八千一百一十三為益實四萬九千四百六十四為從方二萬九千六百八十二為益亷一萬五十一為從隅立方開之得金圓周又立天元一為銀圎周如積求之得五百三十三萬八十二百八十為益實二萬二百五十三為從方四百七十一為從亷一萬五十一為從隅立方開之得銀圎周又立天元一為玉圎
