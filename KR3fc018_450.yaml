body:
  text: 乘方開之得實徑合問今有方田一段內有環池占之餘積以還內圎徑乘之減外周羃餘二萬五千一百六十四步只云四角至池外楞各長一十一步半內外周差三十六步問三事各幾何答曰內圎徑二十八步田方四十五步池環徑六步術曰立天元一為環之內圎徑如積求之得一百二十九萬六千五百四十為益積一萬四千
