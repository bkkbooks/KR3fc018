body:
  text: 尺數如積求之得二百二十四為正實三十為益方一為正隅平方開之得羅尺數又立天元一為羅尺價如積求之得三千五百八十四為正實一百二十為益方一為正隅平方開之得羅尺價合問廪粟回求六問今有方倉一所受粟五百七十六斛只云倉闊不及倉長三尺深如闊三分之二斛法二尺五寸後皆倣此問倉長闊深各幾何答曰長一丈五尺闊一丈二尺深八尺
