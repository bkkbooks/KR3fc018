body:
  text: 為益實二十為益方一為益廉一為從隅立方開之得實徑求得通徑八十步池徑六十步又輞二之輞積以實徑而一得一百七步六分為車輞內外周相和之數又立天元一為截池矢如積求之得一兆四十九千九萬七千九百一十七億五千五百五十九萬一千九百三十六為正實二十五百五十八萬三千億三千九百八十三萬八千七百二十為益方一十八萬七千八百二十九億八千四百六千三萬一十六為從上廉二萬七千六百五十四億五千三百
