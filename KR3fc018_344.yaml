body:
  text: 五萬七千七十六爲益實一十三爲従方一十八爲従廉五爲従隅立方開之合問箭箭積交叅七問今有方圎箭各一朿共積九十七隻只云方箭外周不及圎箭外周四隻問方圎周各幾何答曰圎周二十四隻方周二十隻術曰立天元一爲圎箭外周如積求之得四千六百八爲益實二十四爲從方七爲従隅平方開之得圎周合問
