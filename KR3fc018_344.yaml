body:
  text: 五萬七千七十六為益實一十三為從方一十八為從廉五為從隅立方開之合問箭箭積交參七問今有方圎箭各一朿共積九十七隻只云方箭外周不及圎箭外周四隻問方圎周各幾何答曰圎周二十四隻方周二十隻術曰立天元一為圎箭外周如積求之得四千六百八為益實二十四為從方七為從隅平方開之得圎周合問
