body:
  text: 千四百六十二貫問招來幾日答曰一十五日術曰立天元一為三角落一底子如積求之得九萬二千七百三十六為益實六百六十為従方一百八十一為従上㢘二十二為従下㢘一為正隅三椉方開之得三角落一底子一十二箇加三即日數錢求日數術日立天元一為三角撒星底子如積求之得五百六十一萬八百四十為益實一萬八千三百六十二為従方六十三百九十為従上㢘一千七十五為従二㢘
