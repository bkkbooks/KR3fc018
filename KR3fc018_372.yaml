body:
  text: 丙截積六百五步從南橫截一句股與乙從東竪截一句股與丙外剩直田一段與甲問三人各截長闊幾何答曰甲截長五十五步截闊三十八步乙截股九十五步截句三十八步丙截股五十五步截句二十二步術曰立天元一為乙截句如積求之得一千四百四十四為益實一為正隅平方開之得乙截句即甲截闊又立天元一為丙截股如積求之得
