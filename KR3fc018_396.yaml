body:
  text: 九十萬九千七百六十為從二廉一百二十四億五千一百八十六萬八千六十四為益三廉九億二千二百七十四萬三千三百六十為益四廉四百九十五萬五千六百六十四為益五廉八萬二千三百二十為從下廉二千四百一為從隅七乘方開之得截池矢六步倍之以減池矢餘自乘復減池徑羃餘為實平方開之得截池弦又池矢自乘倍之以池徑除之得數為池周弦差加池弦得輞內周以減內外周相和之數餘即外周又池矢加實徑為通矢自乘倍
