body:
  text: 二萬六千五百九十二為益實一百八十九為徔隅立方開之合問今有立圎積九百二十七尺一十一分尺之九問為密立圎周幾何答曰三丈六尺術曰立天元一為密立圎周如積求之得四萬六千六百五十六為益實一為正隅立方開之得三丈六尺合問今有平羃二百六十五尺問為平方面幾何答曰一十六尺一十一分尺之三
