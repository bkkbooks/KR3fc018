body:
  text: 廉七十為益五廉一為益隅七乘方開之得股今有弦和較乘弦和和加句弦較乘句弦和得四十步只云句幂與股弦和等問弦幾何答曰五步術曰立天元一為弦如積求之得一千五百二十五為正實一百四十為從方五十四為益上廉一十二為益下廉一為正隅三乘方開之得弦合問今有積減弦和較餘一十步只云句股和七步問
