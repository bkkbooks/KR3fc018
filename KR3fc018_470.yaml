body:
  text: 一從隅立方開之併入臺方靣共得一丈一尺臺髙不及池方靣九尺臺方靣羃與外田方同問三方靣及臺髙各幾何答曰田方六十四尺池方二十五尺臺髙一丈六尺臺方八尺術曰立天元一為開方數如積求之得八千一百三十三為正實四千六百九十七為益方五百二十七為正上廉一百二為正二廉二十二為益下廉一為正隅四乘方開之得三尺為開
