body:
  text: 答曰圎周三十六步方面一十二步術曰立天元一為圎田周如積求之得二萬六千三百五十二為正實一千一百二十八為益方一十一為正隅平方開之得圎田周合問今有方圎田各一假圎從徽術方田羃內減圎田積餘以方田羃乘之得五千八百七十七步一百五十七分步之六十三只云方田面如圎田周三分之一問方田面圎田周各幾何答曰方面一十二步圎周三十六步
