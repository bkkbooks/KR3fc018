body:
  text: 上長四箇術曰立天元一為下闊如積求之得九十五萬三千一百九十為正實七十七萬二千三百六十八為益方二十五萬四千八百六十一為従上㢘四萬三千七百三十八為益二㢘四千一百一十二為従三㢘二百一為益四㢘四為正隅五椉方開之合問今有蒭童甍果子積一百箇只云併下長下闊及髙為共減二餘以平方開之與上長等下長多於上長中半上長不及下
