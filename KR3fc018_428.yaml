body:
  text: 上長四箇術曰立天元一為下闊如積求之得九十五萬三千一百九十為正實七十七萬二千三百六十八為益方二十五萬四千八百六十一為從上廉四萬三千七百三十八為益二廉四千一百一十二為從三廉二百一為益四廉四為正隅五乘方開之合問今有芻童甍果子積一百箇只云併下長下闊及髙為共減二餘以平方開之與上長等下長多於上長中半上長不及下
  hash: sha256:69c85efb434cbef6fbca09e778bf0351045e48d14ff0b1295d6494b300b2b193
