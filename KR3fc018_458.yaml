body:
  text: 七萬七千六百六十四為益實五千九十一步二分為從方五步七分六釐為從隅平方開之合問今有圓田一段西邊被水侵入一弧外有殘周五十三步弦長二十步問圓徑弧背矢闊各幾何答曰圎徑二十五步矢闊五步弧背二十二步術曰立天元一為水侵弧矢如積求之得三萬為正實七千三百為益方六百為從上廉七十三為益下廉一為正隅三乘方開之得矢闊又
