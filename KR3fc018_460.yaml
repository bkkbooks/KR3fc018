body:
  text: 矢除半囹弦羃加矢即圎田徑又倍矢羃以圎徑除之為弦背差加弦即弧背合問今有方田一段西北隅被水侵占之餘積七千一百一十二步半只云東南隅斜至水楞一百八步半問田方及水長各幾何答曰田方八十五步水長二十一步術曰立天元一為田方靣如積求之得一萬九千一百二十五為正實三百一十為益方一為正隅平方開之所得七之五而一為田斜內減
