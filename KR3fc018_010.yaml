body:
  text: 往往皆不能盡其法者又豈非古學之無傳乎而學者莫知所依據邪燕山松庭朱先生以數學名家周游湖海二十餘年矣四方之来學者日衆先生遂發明九章之妙以淑後學為書三卷分門二十有四立問二百八十有八名日四元玉鑑其法以元氣居中立天元一扵下地元一扵左人元一扵右物元一扵上陰陽升降進退左右通變化錯綜無窮其扵盈絀隱互正負方程演段開方之術精妙元絕其法學能發先賢未盡之旨會萬理而朝元統三才而立歸極椉除
  hash: sha256:004adb639210eab192eea277c88430b616e58d2a85f19a61c63bca02fdfc5397
