body:
  text: 往往皆不能盡其法者又豈非古學之無傳乎而學者莫知所依據邪燕山松庭朱先生以數學名家周遊湖海二十餘年矣四方之來學者日衆先生遂發明九章之妙以淑後學為書三卷分門二十有四立問二百八十有八名日四元玉鑑其法以元氣居中立天元一于下地元一于左人元一于右物元一于上陰陽升降進退左右通變化錯綜無窮其于盈絀隱互正負方程演段開方之術精妙元絶其法學能發先賢未盡之旨會萬理而朝元統三才而立歸極乘除
  hash: sha256:2e467b3c84ad911ad5e5166e43d2efe1ee0dd004c244fff08b3fa4aa310e8671
