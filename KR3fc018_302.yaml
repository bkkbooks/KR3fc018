body:
  text: 答曰樓髙二丈八尺城髙三丈一尺術曰立天元一為樓髙如積求之得二千八百為益實一百為從方開無隅平方而一得樓髙求城髙者置表髙減人目及入表餘乘表間為實以兩表退行相多為法實如法而一合問今有方城不知大小立兩表東西相去四十三步二分齊人目以索連之令東表與城東南隅及東北隅參相直於東表退行一十四步八分遙望城西北隅入索東端一十步又却北行去表六十
