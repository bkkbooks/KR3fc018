body:
  text: 五至隅頭借問長平數目事答曰長一十六步闊一十五步術曰立天元一為長地元一為平天地配合求之得五萬七十六百為正實二千八百八十為益方一百七十三為益上廉八為一益下廉一為正隅三乘方開之得長又立天元一為闊地元一為長天地配合求之得五萬七十六百為正實一千九百二十為益方一百七十三為益上廉一十二為益下廉一為正隅三乘方開之得闊合問
