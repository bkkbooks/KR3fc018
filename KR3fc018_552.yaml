body:
  text: 答曰一百六十九步術曰立天元一為弦羃地元一為股天地配合求之得二千八百七十三為正實一十七為益方開無隅平方合問左右逢元二十一問今有弦和較乗句得六步只云弦較較除股羃得四步問句股幾何答曰句三步術曰立天元一為股地元一為較天地配合求之得三千七十二為正實七百八十四為益上
