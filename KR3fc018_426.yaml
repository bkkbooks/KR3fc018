body:
  text: 術曰立天元一為上靣箇數如積求之得六千九百四十一為益實九十五為益方六為從隅立方開之合問今有芻童果子積八十二箇只云併下長上闊平方開之加入下闊共得八箇下闊不及下長二箇上闊如上長二分之一髙與長上同問上下長闊及髙各幾何答曰下闊五箇下長七箇髙四層上闊二箇
