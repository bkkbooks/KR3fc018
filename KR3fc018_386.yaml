body:
  text: 步乙西截一弧計積九十步只云甲截矢少如乙截矢三步問二弧各截弦矢幾何答曰甲截矢三步截弧一十八步乙截矢六步截弧二十四步術曰立天元一為甲截矢如積求之得三萬五千七百二十一為正實三萬五千七百二十一為從方一萬七百七十三為從上廉九千六百六百十六為益二廉二百七為從三廉三十三為從下廉五為益隅五乘方開之得甲截矢又
