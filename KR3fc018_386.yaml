body:
  text: 步乙西截一弧計積九十步只云甲截矢少如乙截矢三步問二弧各截弦矢幾何答曰甲截矢三步截弧一十八步乙截矢六步截弧二十四步術曰立天元一爲甲截矢如積求之得三萬五千七百二十一爲正實三萬五千七百二十一爲従方一萬七百七十三爲従上廉九千六百六百十六爲益二㢘二百七爲従三㢘三十三爲従下㢘五爲益隅五乘方開之得甲截矢又
