body:
  text: 云數餘為池斜倍之即水長合問今有方五斜七八角田一段內復有方五斜七八角池占之餘積三千九百七十七步四十九分步之七只云靣徑至池楞各長一十七步問田池靣各闊幾何答曰田闊三十六步池闊二十二步術曰立天元一為池靣闊如積求之得三十六萬二千二百八為益實一萬六千四百六十四為從方開無隅平方而一得池闊加差一十四
