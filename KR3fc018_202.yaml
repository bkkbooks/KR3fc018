body:
  text: 六為益實二百五十七為從方一十二為益隅平方開之得平不盡按之分法求之合問今有直積一百一十歩二分歩之一只云長平差四歩一十二分歩之一問長平各幾何答曰平八歩三分歩之二長一十二歩四分歩之三術曰立天元一為平如積求之得一千三百二十六為益實四十九為從方一十二為從隅平方開之得平不盡按之分法求之合問今有直積一百一十歩二分歩之一只云三平內减二長餘有六分歩之三問長平
