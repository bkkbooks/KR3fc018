body:
  text: 磚用幾何惱得先生沒亂殺答曰闊二寸四分長七六分磚四十五億四千七百三十六萬八千四百二十一枚一十九分枚之一重八百一十六億四千八百萬斤術曰立天元一為磚闊如積求之得一十八寸二分四厘為正實一十寸為益方一寸為正隅平方開之得磚闊求磚數者以寸畞法通城積為實以一磚之積寸為法實如法而一不盡約之為分合問
