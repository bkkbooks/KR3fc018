body:
  text: 磚用幾何惱得先生沒亂殺答曰闊二寸四分長七六分塼四十五億四千七百三十六萬八千四百二十一枚一十九分枚之一重八百一十六億四千八百萬斤術曰立天元一爲塼闊如積求之得一十八寸二分四厘爲正實一十寸爲益方一寸爲正隅平方開之得塼闊求塼数者以寸畞法通城積爲實以一塼之積寸爲法實如法而一不盡約之爲分合問
