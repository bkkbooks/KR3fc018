body:
  text: 一為從方三為從廉二為從隅立方開之得丙分八層又立天元一為乙分層數如積求之得三千九百為益實一為從方三為從廉二為從隅立方開之得一十二層內減乙分層數餘為丙分層數以減共髙餘即甲分層數合問今有三角四角果子各一所共積一百一十一箇只云四角底靣不及三角底靣一箇問二底靣各幾何答曰三角底靣六箇四角底靣五箇術曰立天元一為三角底靣如積求之得二百
