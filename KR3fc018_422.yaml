body:
  text: 求之得六十六萬五千二百八十為益實一百二十為從方二百七十四為從上廉二百二十五為從二廉八十五為從三廉一十五為從四廉一為正隅五乘方開之合問今有圎錐果子積九百三十二箇問髙幾層答曰一十五層術曰立天元一為層數如積求之得七千四百五十五為益實二為從方三為從廉二為從隅立方開之合問今有三角臺果子積五百四箇只云上下靣底
