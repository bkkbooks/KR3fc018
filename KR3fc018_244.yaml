body:
  text: 益方九萬三千六百三十二為徔上亷四千七百四十一為益下亷七十七為徔隅三乘方開之得圎周合問今有方圎田各一假圎徔古法方田積內減圎田積餘以圎田徑乘之得四百三十二步只云方田周虛加一算平方開之不及圎田徑五步問方面圎周各幾何答曰圎周三十六步方面一十二步術曰立天元一為圎田徑如積求之得六千九百一十二為益實五百七十六為徔方四百八
