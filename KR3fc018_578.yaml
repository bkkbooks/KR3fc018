body:
  text: 為從上亷二為從二亷八為從下亷二為益隅四乘方開之得長合問今有直積三乘方開之得數以平除之不及平三步只云長以平方開之多於平二分之一問長平各幾何答曰平四步長六十四步術曰立天元一為平地元一為長天地配合求之得四為正實八十一為益方一百八為從上亷五十四為益二亷一十二為從下亷一為益隅四乘方開之得平合問
