  text: 閫入下服股二尺八寸八分又復立重矩於上其間相去五尺更従句端斜望門額入上服股三尺六寸又望門閫入上股二尺四寸問城門髙幾何答曰門髙一丈術曰立天元一爲門髙如積求之得五十寸爲正實五分爲益方開無隅平方而一得門髙合問或問歌彖一十二問或問今有方池一所每面丈四方停葮生西岸長其刑出水三十寸整東岸蒲生一種
