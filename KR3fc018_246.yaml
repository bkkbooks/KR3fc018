body:
  text: 十為益上亷一百三十六為徔二亷二十為益下亷一為正隅四乘方開之得圎田徑三之為圎周合問今有方圎田各一假圎徔徽術方田積內减圎田周三分之二餘數於上圎田積內加方田面二分之一减上餘一十步一百五十七分步之一百二十八只云併方面圎周為益實二為益方三為徔亷一為徔隅立方開之得數如方田面弱半問圎周方面各幾何
