body:
  text: 餘数加上以方田靣少半乗之又以圎田周六分之一乗之得二千三百四歩只云方田面為益寔四為益方三為徔亷一為正隅立方開之得数以十八乗之與圓田周等問方面圎周各幾何答曰方面一十二歩圎周三十六歩術曰立天元一為開方數如積求之得一千一百五十二為益寔五十六為益二亷三十為徔三亷一十九為徔四亷六為徔五亷一為徔隅
