body:
  text: 餘數加上以方田靣少半乘之又以圎田周六分之一乘之得二千三百四步只云方田面為益實四為益方三為徔亷一為正隅立方開之得數以十八乘之與圓田周等問方面圎周各幾何答曰方面一十二步圎周三十六步術曰立天元一為開方數如積求之得一千一百五十二為益實五十六為益二亷三十為徔三亷一十九為徔四亷六為徔五亷一為徔隅
