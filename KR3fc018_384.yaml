body:
  text: 為益上廉三百六十為益下廉五為正隅三乘方開之得甲截矢九步列甲積通分納子內減矢羃餘以矢除之即甲截弦又立天元一為共截矢如積求之得二百六十二萬四千四百為益實三千二百四十為從上廉三百六十為從二廉五為益隅三乘方開之得共截矢一十八步內減甲截矢餘即乙截矢又共矢自之以減甲乙併積通分內子之數除以共矢而一即乙截弦合問今有圎田一段甲東截一弧計積三十一步中半
