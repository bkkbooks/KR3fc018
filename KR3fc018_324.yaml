body:
  text: 術曰立天元一為椽數如積求之得二千七十為益實一為益方一為從隅平方開之得椽數又立天元一為每株椽價如積求之得一萬八千六百三十為益實三為從方一為正隅平方開之合問或問方城里周六十四假使金磚遍鋪地每條均鑄厚一寸長闊相和恰一尺寸金十五兩為法尚帶零株一十八每磚計重十七斤一十五兩六銖答七絲二黍在其中共是一磚之重率長闊余
  hash: sha256:69e28ec614bf00ec8787f84c318b287f3ed88876ba7638bb8348de1bab60fb86
