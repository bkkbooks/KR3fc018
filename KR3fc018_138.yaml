body:
  text: 問端長尺價各幾何答曰端長五丈二尺尺價六十五文四分文之三術曰立天元一為尺價如積求之得三千四百一十九為益實五百七十八為從方八為益隅平方開之得尺價不盡以連枝同體術求之今有綾一匹直錢一貫五百四十八文只云尺價內减匹長餘以尺價乘之减尺價餘一貫三百一十四文問各幾何答曰匹長二丈八尺三分尺之二尺價五十四文術曰立天元一為尺價如積求之得二千八
