body:
  text: 答曰匹長三丈六尺四分尺之三尺價四十五文三分文之一術曰立天元一為匹長尺價齊率如積求之得一百四十四為益實一為正隅平方開之得一十二為齊率以除分母分子之數合問今有錦一匹先賣了三尺餘賣得錢二貫九百七十五文只云匹法不及尺價四十七文問匹長尺價各幾何答曰匹長三丈八尺尺價八十五文術曰立天元一為匹長如積求之得三千一百一十六為益實四十四為從方一為正隅平方
