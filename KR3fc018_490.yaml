body:
  text: 取弱半共得三十二斗又米取太半麥取中半豆取太半共得三十七斗其米斗價取三分之一麥斗價取八分之五豆斗價取二分之一共得八十七文又豆麥斗價和得一百一十文麥斗價少如米斗價八文問三色及斗價各幾何答曰米一碩六斗斗價七十二文麥一碩八斗斗價六十四文豆一碩四斗斗價四十六文
