body:
  text: 三乘方開之得截矢合問今有圎田一段徑九十步甲乙共截一弧其甲從邉復截一弧以次給乙甲截積二百八十三步二分步之一乙截積五百二十六步二分步之一問甲乙各截弦矢幾何答曰甲截矢九步截弦五十四步乙截矢九步截弦七十二步術曰立天元一為甲截矢如積求之得三十二萬一千四百八十九為正實一千一百三十四
