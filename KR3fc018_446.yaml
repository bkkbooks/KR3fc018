body:
  text: 廉一千一十六為益五廉二百九十二為從六廉三十九為益下廉二為從隅八乘方開之合問今有三角四角果子各一所共積二百一十一箇只云三角底子一層之數與四角底子一層之數等問各幾何答曰三角底靣八箇四角底靣六箇術曰立天元一為三角底子如積求之得六百四十一萬一千二十四為正實三萬五千四百五十為益方四萬五千五百三十三為益上廉一萬一千二為益二廉九十九為從三廉三十
