body:
  text: 四元之形象收則其緼照徹而明開則縱橫發揮而曲書妙埋理矣漢卿名世傑松庭其自號也周流四方復遊廣陵踵門而學者雲集大德巳亥編集算學啓蒙趙元鎮巳與之板而行矣元鎮者博雅之士也惠然又備巳財鳩工繡梓俾之茲行于世前成始而今成終也好事之德奚可量哉二書相為表裏不其韙歟屬余為引余詳觀之有素所未嘗接於耳目者不用而用以之通非數而數以之成由是而知有數皆從無數中來髙邁於前賢能書以矣明算君子據余言試為細草然後知誠而不妄
  hash: sha256:a5a8e5c89bf3a4089c6bce7d8936854bac507befc33f9632f98a898047b96f2a
