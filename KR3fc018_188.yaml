body:
  text: 五日役畢問臺上下廣袤及高各幾何答曰上袤二丈四尺下袤三丈八尺上廣一丈二尺下廣二丈六尺高四丈五尺術曰立天元一為臺之上廣如積求之得七萬七千六百四為益實一千八百一十三為益方五百四十六為益上亷三十一為從下亷六為從隅三乘方開之即臺上廣合問今有造圓臺一所只云併上下周髙為實平方除之如上周弱半髙與上下周差同髙多
