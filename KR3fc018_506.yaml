body:
  text: 千四百為益實五千四百七十六為從上亷一為益隅三乘方開之得長又立天元一為和如積求之得八千八百三十六為益實一為正隅平方開之得和又立天元一為較如積求之得二千一百一十六為益實一為正隅平方開之得較合問今有句股田一假取句弦和一股弦和二句弦較三為共內减股弦較四餘二百六十步又句弦和二股弦和一股弦較三為共內减句弦較四餘七十
