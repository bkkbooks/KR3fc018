body:
  text: 立方開之得髙二丈四尺餘依加減求之求濠深術曰四因城積三除為實又城下外周併入六箇濠廣及城下外周折半以濠廣乘之為法實如法而一即濠深合問今有築方城一座計積四千五百四十一萬七千六百尺只云下面外方減十步餘開方除之併入下廣共得六十五步又開方數少如上靣外方三千五百四十六步上靣內外方差四步上面外方多如下靣內方六步上下廣差三步上
