body:
  text: 術曰列積四之三而一于上又一磚之積乘合用磚數四之五而一加上為實又城下外方身外加四三之加六箇池上廣為池上外周又池內周加六箇池下闊為池底外周併而半之為池底停周又併池上內外周而半之為池上停周倍之加底停周以上廣乘之于上又倍底停周加上停周以下廣乘之併上如六而一所得為法除實即池深求興功畢日術曰置城積併入合用磚數以二人乘之為實併入日常積及人日燒用磚數以共差夫乘
