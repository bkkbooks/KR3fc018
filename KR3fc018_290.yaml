body:
  text: 之得一千八十為正實七十二為益方上實下法而一得弦合問今有直積一百八步只云五和五較相乘得三千七百八十步問弦幾何答曰一十五步術曰立天元一為弦如積求之得七千九百七十四億九千三百六十五萬六百二十五為益實七十五億二千二百八十四萬二千六百為從上亷二千五十二萬四十千九百九十五為益三亷一萬二千六百三十六為從隅五乘方開
