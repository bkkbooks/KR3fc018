body:
  text: 亷二十四為從隅立方開之得平不盡按之分法求之合問今有直積自乘減和羃餘一萬一千七百五十一步一百四十四分步之八十三只云較不及平四步一十二分步之七問長平各幾何答曰平八步三分步之二長一十二步四分步之三術曰立天元一為平如積求之得一百六十九萬五千二百五十二為益實三千九百六十為從方一千七百二十九從上亷二千六百四十
