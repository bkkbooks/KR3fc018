body:
  text: 術曰立天元一為方圎箭外周如積求之得五百七十六為益實一為正隅平方開之合問今有方圎箭各一朿共積九十七隻只云方箭外周如圎箭外周六分之五問方圎周各幾何答曰方周二十隻圎周二十四隻術曰立天元一為方箭外周如積求之得一十一萬四千為益實一千三百二十為從方二百一十九為從隅平方開之得方周合問今有方圎箭各一朿共積六十二隻只云圎外箭
