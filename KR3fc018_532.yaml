body:
  text: 末群二十四隻地上二十一隻術曰立天元一為次群鴈如積求之得一百二十八為正實六十六為益方一為正隅平方開之得次群鴈合問今有徽術弧田一畆一百七十二步只云矢不及弦五十步問弦矢各幾何答曰弦六十步矢一十步術曰立天元一為弦如積求之得三十三萬四千八百為正實三萬為益方四百七為從隅平方開之得弦合問
