body:
  text: 術曰立天元一爲城之半圓徑如積求之得三十六萬為正實六萬六千為従方二千四百爲從上亷一為益隅三乗方開之得半圓徑六千歩倍而三之即城周也合問今有方城不知大小各中開門北門外九十歩有郵亭一所人於城中出西門外行一百六十歩却遙望參城隅見亭問城方幾何答曰二百四十歩術曰立天元一爲城之半方面如積求之得一
