body:
  text: 術曰立天元一為城之半圓徑如積求之得三十六萬為正實六萬六千為從方二千四百為從上亷一為益隅三乘方開之得半圓徑六千步倍而三之即城周也合問今有方城不知大小各中開門北門外九十步有郵亭一所人於城中出西門外行一百六十步却遙望參城隅見亭問城方幾何答曰二百四十步術曰立天元一為城之半方面如積求之得一
