body:
  text: 百二為益實七千七百四為從方三百八十四為益隅平方開之得長不盡按之分法求之合問今有直積一百一十步二分步之一只云併一長二平三和四較共得一百一十步一十二分步之八問長平各幾何答曰平八步三分步之二長一十二步四分步之三術曰立天元一為平如積求之得一萬六百八為益實一千三百二十八為從方一千二為益隅平方開之得平不盡按之分術求之合問今有直積加平四分之一共得一百一十二步三
