body:
  text: 百為三寔六百七十六為益之亷一為三隅三乘方開之得長又立天元一為阔如積求之得五萬七千六百為益寔六百七十六為従之亷一為益隅三乘方開之得闊又立天元一為和如積求之得一千一百五十六為益寔一為三隅平方開之得和又立天元一為數如積求之得一百九十六為三实一為負隅平方開之得較合问或問我有一壺酒携着遊走遇務添一倍逢店飲㪷九店務經四處沒了壺中酒借
