body:
  text: 百為三實六百七十六為益之亷一為三隅三乘方開之得長又立天元一為闊如積求之得五萬七千六百為益實六百七十六為從之亷一為益隅三乘方開之得闊又立天元一為和如積求之得一千一百五十六為益實一為三隅平方開之得和又立天元一為數如積求之得一百九十六為三實一為負隅平方開之得較合問或問我有一壺酒携著遊走遇務添一倍逢店飲斗九店務經四處沒了壺中酒借
