body:
  text: 二步一千八百一十五步只云博徑三步問池方田周各幾何答曰池方一十八步田周九十步術曰立天元一為池方為積求之得四十八步四千七百七十六為益實以前八百四為從方四百二十四為從上廉三十六為從下廉一為徑隅三乘方開之得池方合問今有環田積實徑乘外周加之却見內周冪餘七百二十九步只云併內外周減二餘以平方開之所得不及實徑一步問
