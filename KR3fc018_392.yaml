body:
  text: 徑羃餘爲實開平方卽小弧弦合問今有圎田一段內復有圎池占之二圎皆依古法餘地八畞強半畞只云環之實徑自乘多於通徑二十步今欲従西竪截車鞇積五百三十八步問截池弦池矢及內外周兩頭慱徑各幾何答曰截池矢六步池弦三十六步內周三十七步二分周外七十步四分慱徑一十四步實徑一十步術曰立天元一爲環之實徑如積求之得七百
