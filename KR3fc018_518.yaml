body:
  text: 分六釐為正實一十寸為益方一寸為從隅平方開之得頂厚合問今有人買酒持錢一十二貫七百四十四文只云每瓶納稅八十五文又共與用錢一百二十六文無錢納官准酒九瓶問共酒及瓶價各幾何答曰共酒三十六瓶瓶價三百五十四文術曰立天元一為瓶價如積求之得一十二萬三百六十為益實一十四為益方一為正隅平方開之得瓶價合問
