body:
  text: 立天元一為乙截矢如積求之得六十為益實一十六為從方一為益隅平方開之得乙截矢今有大小圎田各一段共地六畞六十四分畞之六十一只云小圎徑如大圎徑八分之五今於二圎從邉各截一弧共積二百二十二步半其小弧矢不及大弧矢三步問二弧矢各幾何答曰截大弧矢八步截弦三十二步截小弧矢五步截弦二十步術曰立天元一為大圎徑如積求之得
  hash: sha256:e9bbb763b0d02ed222a99aa7f31f4e3ac5e28f91142e04ec646b8ca04c11e8cf
