body:
  text: 九為益五亷二百三十三為益六亷六百七十為從七亷三十六為從八亷八十二為益九亷二為益十亷四為正隅十一乘方開之合問四象朝元六問今有五平三長立方開之少股一步只云三和四較平方開之多句二步問弦較較帶黃方二事連環得幾何答曰六步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得三萬九十三
