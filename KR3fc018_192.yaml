body:
  text: 髙為正實十為益方一為正隅平方開之所得再為實開平方除之少如先開方數中畢上方多如先開方數強半上下方和得三十八尺每人日程常積二十八尺每三人支錢二貫四百七十七文七分文之一用徒日悟倍令四日役畢問臺上下方髙及逐日用徒支錢各幾何答曰上方一丈六尺下方二丈二尺髙二丈四尺初日二十人五分人之四錢一十七貫一百七十四文七分文之六
