body:
  text: 四十為正實四十為益方上實下法而一得城髙求表去城者以前表退行乘表間為實兩表退行差為法實如法而一合問今有方城上有戍樓不知髙逺立兩表齊髙一丈五尺表間相去八十步令前表與後表參相直人目髙四尺於前表退行三十步遙望樓岑與前表末參合復望樓足入表五尺六寸又從後表退行五十步遙望樓岑與後表末參合問城樓答各幾何
