body:
  text: 或問一隻銀盤三尺周內容三隻水晶毬若人筭答得穿心徑萬兩黃金也合酬答曰五寸六十九分寸之二十五術曰立天元一爲毬子徑如積求之得三百爲益實六十爲従方一爲正隅平方開之得毬子徑四寸不盡命分以減盤徑合問或問積減弦長與半平餘與三句五股停句弦股弦差相併要作原長少半平答曰句八步股一十五步弦一十七步術曰立天元一爲句地元一爲股人元一爲弦
