body:
  text: 亷一百六十八為従下亷五為益隅三乗方開之合問今有句弦相乗比宜直積多三步只云股弦相乗比弦少五步問句股幾何答曰句三步股四步術曰立天元一為股地元一為股弦較天地配合求之得一十二為正實三為益方開無隅平方合問今有直積加平减二較以長乗之减積以平除之加二較共得一十五步三分步之一
