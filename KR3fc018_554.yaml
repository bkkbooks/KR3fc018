body:
  text: 亷一百六十八為從下亷五為益隅三乘方開之合問今有句弦相乘比宜直積多三步只云股弦相乘比弦少五步問句股幾何答曰句三步股四步術曰立天元一為股地元一為股弦較天地配合求之得一十二為正實三為益方開無隅平方合問今有直積加平減二較以長乘之減積以平除之加二較共得一十五步三分步之一
