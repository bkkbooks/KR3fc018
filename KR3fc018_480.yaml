body:
  text: 今有梯田一叚大闊三十二步小闊八步長二十二步半欲於小頭容圎池一所問容池周幾何答曰四十步術曰立天元一為小頭容圎徑如積求之得九百六十為益實一百二十八為益方一十五為従隅平方開之不盡按之分法求之合問今有圎田一叚內有匝邉容等径圎池三所只云田周减六步餘為益實一十四為従方五為益亷一為正隅立方開
