body:
  text: 底靣得二箇問二底靣各幾何答曰三底角靣四箇四角底靣八箇術曰立天元一為三角底子如積求之得一千九百五十六為益實五為從放二十一為從上廉二十五為從隅立方開之合問今有四角果子積以三角果子積除之得七箇只云三角底靣如四角底靣七分之四問二底靣各幾何答曰三角底靣四箇四角底靣七箇術曰立天元一為三角底子如積求之得三百
