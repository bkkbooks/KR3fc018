body:
  text: 術曰如方程正負術入之左行得小斜中行得中斜左行求大斜立天元一為中股如積求之得一千二百九十六為益實一為正隅平方開之得中股合問今有直田環田各一假共一十三畝四分畝之一只云併環田外周一中周二實徑三與六箇直田斜相較之多六步又併外周二中周一直斜二與六十三箇實徑相較之少二步又併外周二實徑五直斜一與四箇中
