body:
  text: 今有客持珍珠不知顆數直銀一千二百兩只云每顆納稅銀四錢準納七顆貼與客銀八兩二錢九分錢之二問元珠及顆價各幾何答曰元珠一百三十五顆顆價八兩八錢九分錢之八術曰立天元一為元珠數如積求之得一十八萬九千為正實一百八十五為益方九為益隅平方開之即珍數又立天元一為顆價如積求之得四十三萬二千為益實七百四十為益
