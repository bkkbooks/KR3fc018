body:
  text: 今有客持珍珠不知顆數直銀一千二百兩只云每顆納稅銀四錢准納七顆貼與客銀八兩二錢九分錢之二問元珠及顆價各幾何答曰元珠一百三十五顆顆價八兩八錢九分錢之八術曰立天元一為元珠數如積求之得一十八萬九千為正實一百八十五為益方九為益隅平方開之即珍數又立天元一為顆價如積求之得四十三萬二千為益實七百四十為益
  hash: sha256:d8ef09d6fa74074834f56062f9a99e1ef91e21d05bc4f17f5436b1a7d4364b94
