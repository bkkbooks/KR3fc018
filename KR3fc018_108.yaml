body:
  text: 十為益下㢘一為正隅三椉方開之得斜合問今有方田幂加斜長減方周餘以方靣椉之減方靣餘二千七百七十五歩問方面幾何答曰一十五步術曰立天元一為方靣如積求之得一萬三千八百七十五為益實五為益方一十三為益㢘五為正隅立方開之得方靣合問今有句股田積加弦和和得一百四十步只云句股較一十七步問股幾何答曰二十四步
