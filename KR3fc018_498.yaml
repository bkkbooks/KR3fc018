body:
  text: 亦滿二斤半丙云得甲乙絲各三分之二亦滿二斤半其絲丙價取少半自乘內減太半兩價餘又自乘內加太半兩價共得二千八百二十二貫四百八十四文問絲及斤價各幾何答曰甲一斤半乙一斤二兩丙一十二兩斤價二貫一十六文術曰置絲通兩各以分母乘之如方程正負術入之左行得丙絲中行得乙絲右行得甲絲
