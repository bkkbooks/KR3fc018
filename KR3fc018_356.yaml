body:
  text: 平方開之得中股八步又立天元一為較如積求之得四千一百七十六為正實三千三百四十四為益方六百三十五為從上廉四十四為益下廉一為正隅三乘方開之得較合問今有四不等田一段東長二十六步西長二十五步南闊一十四步北闊一十七步與鄰對換直田一段只云併直田長較為實五為從方一為從隅平方開之所得不及平七步問長平各幾何
