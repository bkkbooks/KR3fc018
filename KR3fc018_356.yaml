body:
  text: 平方開之得中股八步又立天元一爲較如積求之得四千一百七十六爲正實三千三百四十四爲益方六百三十五爲従上㢘四十四爲益下㢘一爲正隅三乘方開之得較合問今有四不等田一段東長二十六步西長二十五步南闊一十四步北闊一十七步與隣對換直田一段只云併直田長較爲實五爲從方一爲從隅平方開之所得不及平七步問長平各幾何
