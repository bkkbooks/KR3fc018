body:
  text: 六千六百二十四為正隅平方開之合問今有句弦較乘股弦和加句股和開方得數多股一步只云股弦較乘弦較和減弦開方得數少黃方羃三步問弦和較幾何答曰二步術曰立天元一為句地元一為股人元一為弦和較三才相配求之得三千五百六十為正實七百六十為從方七千六百九十八為益上亷一千一百三十四為益二亷六千五百二十二為從三亷七百二十為從四亷二千八百二十
