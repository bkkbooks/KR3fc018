body:
  text: 為帶分股弦較置股弦和九步亦以九椉之得八十一步為帶分股弦和俱帶九為分母和較相加得為帶分弦相減得為帶分股以十八乘天元得為帶分句俱帶十八為分母句股相乘又以帶分黄方得椉之得三十六約之得為一百六十二箇黄方椉直積式寄左乃置元積二十四步以一百六十二椉之得三千八百八十八步與左相消得四椉方開之得句三步合問
