body:
  text: 為従下㢘二為正隅五椉方開之合問鎖套吞容一十九問今有圎田一段內有圎池占之餘積六百一十二步只云實徑自椉不及內周四十八步却與內外周差等問三事各幾何答曰實徑自六步內周八十四步外周一百二十步術曰立天元一為實徑如積求之得二千四百四十八為益實三十二為従上㢘一為従隅三
