body:
  text: 截長闊各幾何答曰截長七十五步截闊二十七步術曰立天元一為截長如積求之得二萬五千八百七十五為益實四百二十為從方一為益隅平方開之得截長合問今有圭田一段長一百三十六步闊六十八步今從尖截地二畞四分問截長闊各幾何答曰截長四十八步截闊二十四步術曰立天元一為截長如積求之得二千三百
