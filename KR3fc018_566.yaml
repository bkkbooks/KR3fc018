body:
  text: 一得七步只云較羃加長與平羃同問長平各幾何答曰平八步長一十五步術曰立天元一為長地元一為平天地配合求之得一十五為益實一為從方上實下法而一得長合問今有直田平羃減一和六較餘與長等只云較羃加一平減四較亦與長等問長平各幾何答曰平八步長一十三步
