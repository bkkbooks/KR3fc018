body:
  text: 圎徑幾何答曰七步一十一分步之七術曰立天元一為密圎徑如積求之得七千五十六為益實一百二十一為從隅平方開之得七步不盡桉之分法求之合問今有立圎積九百七十二尺問為古立圎徑幾何答曰一丈二尺術曰立天元一為古立圎徑如積求之得一萬五千五百五十二為益實九為從隅立方開之得一丈二尺合問
