body:
  text: 今有直積加黃方羃開方除之與倍之句弦較等只云弦較較羃減句股和開方除之與股少弦較同問三相和幾何答曰金天十元二一步為句地無一為股人元術曰立天元一為句地元一為股人元一為三相和三才相配求之得八百六十四為益實四千一百四為益方四萬二千二百二十八為從上亷五萬三千九百九十八為益下亷四千二百九為從隅三乘方開之合問今有平乘積如長而一所得減一平三較餘與平
