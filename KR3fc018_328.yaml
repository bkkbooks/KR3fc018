body:
  text: 或問今有人來贖解本多利少難評共收四貫別無零說破源流即省本利各開方畢併之與日相停若還相減甚分明四十文差餘剩答曰本錢三貫六百文月利四十一文三分文之二兩箇月二十日利錢四百文術曰立天元一為本錢地元一為利錢天地配合求之得一百四十四萬為益實四千為從方一為益隅平方開之得本錢餘依加減求之合問或問元有直田一畞地橫行六步竪行四斜行十
