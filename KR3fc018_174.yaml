  text: 廣不及髙五步一尺令侵城四角周回撅圜池取土築城及燒磚包城令池上廣三丈五尺下廣三丈計料內外城頭合用條磚二千四百萬箇其磚每箇長一尺闊五寸厚二寸半每人日常役二十四尺每人日燒磚及包訖城磚三十箇今差夫五萬人一齊興功問上下內外方廣及髙併興功畢日池深各幾何
