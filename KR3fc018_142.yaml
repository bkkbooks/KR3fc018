body:
  text: 乘內减端長二餘相併共得三千五百一十六尺只云端長多於匹長四分之一問端匹各長幾何答曰端長四丈八尺匹長三丈六尺術曰立天元一為端長如積求之得五萬六千二百五十六為益實二十八為益方二十五為正隅平方開之得端長合問今有絹一匹直錢一貫六百六十六文只云匹長如尺價五百四十四分之四百四十一問匹長尺價各幾何
