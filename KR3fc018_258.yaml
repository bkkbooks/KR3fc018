body:
  text: 今有立圎積九百七十二尺問為古立圎周幾何答曰三丈六尺術曰立天元一為古立圎周如積求之得四萬六千六百五十六為益實一為正隅立方開之得三丈六尺合問今有立圓積九百二十八尺一百五十七分尺之一百四問為徽立圎徑幾何答曰一丈二尺術曰立天元一為徽立圎徑如積求之得一千七百二十八為益實一為正隅立方開之合問
