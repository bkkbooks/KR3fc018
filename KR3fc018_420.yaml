body:
  text: 今有四角嵐峯形果子積四百五十八箇問底子幾何答曰五箇術曰立天元一為四角嵐峯底子如積求之得二萬六千八百八十為益實一為從方一十二半為從上廉二十五為從二廉一十七半為從三廉四為正隅四乘方開之合問今有三角撒星更落一形果子積九百二十四箇問底子幾何答曰七箇術曰立天元一為三角撒星更落一底子如積
