body:
  text: 三廉五百四十四為益四廉五百一十二為從五廉三百八十四為益六廉一百六十為從七廉六十四為益下廉一十六為正隅九乘方開之得三步為開方數四之即平合問混積問元一十八問今有直田積加斜幂減平幂餘半之腹減斜幂餘六餘六十七步只云斜較相和二十步問斜長幾何答曰一十三步術曰立天元一為斜長如積求之得二萬二千一百七十八為正實五千三百二十為益方四百九十九為從上廉三
