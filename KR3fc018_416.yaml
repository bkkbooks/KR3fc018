body:
  text: 上廉一十四為從下廉三為從偶三乘方開之得每靣底子合問今有四角果子一所直錢一貫三百六十五文只云底子每箇直錢一文次上層層每箇纍貴二文問底子每靣幾何答曰九箇術曰立天元一為每靣底子如積求之得八千一百九十為益實一為從方二為從上廉二為從二廉一為正隅三乘方開之合問今有四角落一形果子積五百四十箇問底子幾何
