body:
  text: 萬四千四百為益實一為正隅平方開之得一百二十步倍之合問今有圓城不知髙遠立兩表各髙一丈二尺表問間相去八十尺令前表與後表參相直於前表退行六十尺人目薄地遙望乳頭與前表末參合又後從表退行一百尺人目薄地遙望乳頭與後表末參合問城髙及前表去城各幾何答曰城髙三丈六尺表去城一百二十尺術曰立天元一為城髙如積求之得一千四百
