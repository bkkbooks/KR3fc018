body:
  text: 答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得三為正實一十一為従方八為從上亷七為益下亷一為正隅三乗方開之得平合問今有直積加一平减三長餘有三步只云平羃與較等問積幾何答曰三十六步術曰立天元一為直積地元一為平天地配合求之得三十六為益實三十七為従方三十七為益亷一為正隅立方開之得積合問
