body:
  text: 答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得六十三為正實一十八為益方一十六為益上亷二為從下亷一為正隅三乘方開之得平合問今有直積加一長二平共得二十二步只云長羃加平减較羃餘一十八步問長平各幾何答曰平三步長四步術曰立天元一為平地元一為長天地配合求
