body:
  text: 求之得三千六百為正實一百六十九為益方一為正隅平方開之合問今有句股積三十步只云句股和一十七步問股羃幾何答曰一百四十四步術曰立天元一為股羃地元一為句天地配合求之得三千六百為益實一百六十九為従方一為益隅平方開之合問今有句股積三十步只云句股和一十七步問弦羃幾何
