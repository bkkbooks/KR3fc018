body:
  text: 今有宻率弧田積一百三十六步半只云矢羃多於弦二十一步問弦矢各幾何答曰矢七步弦二十八步術曰立天元一為矢如積求之得七千二百三為益實四百八十八為益方一十四為益上亷二十八為從下亷一為正隅三乘方開之得矢七步合問今有立方立圎平方各一所共積二萬九千九百八十四尺只云立圎徑如立方面七分之六平方面如立圎徑三分之二
  hash: sha256:b991afc6ef54cd756915b1a01ec09e7d092f403695ebfefe48ff7842751bd433
