body:
  text: 術曰立天元一為平地元一為工天地配合求之得一百二十為益實三十一為從方六為從亷一為益隅立方開之得平合問今有直積加和羃减較羃以平除之與積等只云長羃加二較减二差羃亦與積等問長平各幾何答曰平五步長一十二步術曰立天元一為長地元一為平天地配合求之得六十為益實一十七為從方一為益隅平方開之得長合問
