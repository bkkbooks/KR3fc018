body:
  text: 九分為益實二尺為從方上實下法而一即長今有立方面五尺問東南上角直至西北下角長幾何答曰八尺六寸一百七十三分十之四術曰立天元一為針長如積求之得七十四為當作十五益實一為正隅平方開之不盡命分合問今有圎材徑三尺只云鋸深三寸問鋸道長幾何答曰一尺八寸術曰立天元一為鋸道長如積求之得三百二十四為益實一為正隅平方開之合問
