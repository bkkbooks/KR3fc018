body:
  text: 四乘方開之得囤髙又立天元一為粟髙如積求之得四萬四千七百一十二為益實三千四百二十為從方二百八十八為從上亷一十六為從二亷二為從下亷方一為正隅四乘方開之得粟髙合問商功修築七問今有積築圓城一座計積四百八十八萬五千三百四十四尺只云下內外周差一百八尺上內外周差四丈二尺上下外周差六十尺上下內周差六尺下廣少如髙
