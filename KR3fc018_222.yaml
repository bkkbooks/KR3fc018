body:
  text: 周如積求之得五百三十萬七千五百五為益實五萬一千三百四十八為從方三萬六百二十四為從亷一萬五十一為從隅立方開之得玉圎周合問今有三角四角果子方箭圎箭平圎径立圎径平方靣立方靣茭草各一所共積一萬五百八十九算只云立方靣不及三角底靣一箇如平方靣五分之二茭草底子多三角底靣一束却與立圎径等圎箭外周如四角底面
  hash: sha256:a5a49b030bf2c0a3d7f488f06c0bbe7d0d384315796860b5bd02f87871aaba33
