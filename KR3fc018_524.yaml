body:
  text: 術曰立天元一為本錢如積求之得三千二百三十六萬六千二百五十為正實一萬一千三百七十九為益方一為正隅平方開之即本錢餘依法求之合問今有錢八貫六百一十二文巳令五人分之只云乙如甲五分之三丙不及乙一貫八百八十文併甲丙以乙除之所得與戊同丁少如丙七百九十文問各分幾何答曰甲四貫七百文乙二貫八百二十文
