body:
  text: 以股除之加句股和以股乘之加股以句除之减二股一句股較與句等只云句乘股羃以股除之加直積減句羃以句除之與弦同問弦和和乘黃方得幾何答曰二十四步術曰立天元一為句地元一為股人元一為開數三才相配求之得六百為益實一千三百二十一為從方五十四為益隅平方開之合問今有直積减句股和以句乘之加句股較减直積以股除之加句股和以股乘之加股
