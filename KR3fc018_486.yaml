body:
  text: 匹長不及紬匹長二尺却多錦匹長一尺問三色用絲及匹法各長幾何答曰錦二丈五尺絲三十五兩綾二丈六尺絲二十八兩紬二丈八尺絲二十三兩術曰立方程正負術入之得三色每匹用絲之數立天元一為錦匹長如積求之得三十五萬八千八百二十五為益實三為从方一為益上亷二為益下亷一為正隅三乗方開之得錦
