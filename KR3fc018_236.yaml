body:
  text: 術曰立天元一為圎田周如積求之得二萬一千九十六為益實三百一十四為益方二十五為正隅平方開之得圎田周又立天元一為方田靣如積求之得七十三萬二千三百八十四為正實八千六百八十六為益上亷二十五為正隅三乘方開之得方田面合問今有方圎田各一假圓徔密率方田積內減圎田周圎田積內減方田面餘二數併得一百九十九步一十一分步之一只云圎周羃減方面餘一千二百八十四步
  hash: sha256:f464d729918170a10dae07e686136a03342ff67b582689b4cb0333820edb3358
