body:
  text: 術曰立天元一為圎田周如積求之得二萬一千九十六為益實三百一十四為益方二十五為正隅平方開之得圎田周又立天元一為方田靣如積求之得七十三萬二千三百八十四為正實八千六百八十六為益上亷二十五為正隅三乘方開之得方田面合問今有方圎田各一假圓徔密率方田積內减圎田周圎田積內减方田面餘二數併得一百九十九步一十一分步之一只云圎周羃减方面餘一千二百八十四步
  hash: sha256:ed8fd78f477e6766e259f4fc5362f33b48ef4c62d9c218844c100578cc6d4a42
