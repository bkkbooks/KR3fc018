body:
  text: 術曰立天元一為圎田周如積求之得二萬一千九十六為益寔三百一十四為益方二十五為正隅平方開之得圎田周又立天元一為方田靣如積求之得七十三萬二千三百八十四為正寔八千六百八十六為益上亷二十五為正隅三乗方開之得方田面合問今有方圎田各一叚圓徔宻率方田積內减圎田周圎田積內减方田面餘二數併得一百九十九歩一十一分歩之一只云圎周羃减方面餘一千二百八十四歩
  hash: sha256:d2434cb068118f7e684c79ba2241247057eb52c8312bb5e446d186d7dd068b29
