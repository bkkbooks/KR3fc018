body:
  text: 十為從下亷一為正隅三乘方開之得二百四十步倍之即長又立天元一為邑半闊如積求之得一十八億六千六百二十四萬為正實二千七十三萬六千為從方二十七萬為益上亷三百六十為從下亷一為正隅三乘方開之得一百八十步倍之即闊合問今有圓城不知大小各中開門甲乙俱從城心而出甲出南門一十五步而立乙出東門四十步見甲問城圓幾何答曰一里
  hash: sha256:a3f6294ae1954db61066feace67d644ca32288093a1c558794c891d2e91e941d
