body:
  text: 千四百三十九為益方一萬八千八百六十五為從亷六百三為從隅立方開之得三角底子又立天元一為四角底子如積求之得二千四百九十八萬二千三百四十四為正實二百六十萬六千六百五十二為益方七萬八千五百六十二為從亷六百三為益隅立方開之得四角底子又立天元一為方箭外周如積求之得八千八百八十二萬六千一百一十二為正實六百九十五萬一千七十二為益方一十五萬七千一百二十四為從亷九百單四丰為益
