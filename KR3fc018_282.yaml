body:
  text: 百九十七歩六分爲益實二百九十一歩六分爲益上亷一為正隅三乗方開之合問今有直積一百八歩只云句弦較乗句股較得一十八歩問句幾何答曰九歩術曰立天元一爲句如積求之得三百七十七萬九千一百三十六爲益實六萬九千九百八十四爲従上亷二百七爲益三亷一爲益隅五乗方開之合問今有直積一百六十八歩只云股弦較乗句股弦較
