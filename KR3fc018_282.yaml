body:
  text: 百九十七步六分為益實二百九十一步六分為益上亷一為正隅三乘方開之合問今有直積一百八步只云句弦較乘句股較得一十八步問句幾何答曰九步術曰立天元一為句如積求之得三百七十七萬九千一百三十六為益實六萬九千九百八十四為從上亷二百七為益三亷一為益隅五乘方開之合問今有直積一百六十八步只云股弦較乘句股弦較
