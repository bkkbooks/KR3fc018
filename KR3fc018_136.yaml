body:
  text: 周徑各幾何答曰實徑十五步內周五十四步外周一百四十四步術曰立天元一為實徑如積求之得二千九百二十五為益實六十為從方六十六為益上廉二十為從下廉一為益隅三棄方開之得實徑一十五步合問端匹互隱九問今有錢三貫四百一十九文買羅一端只云端長內加八尺之價共得五百七十八文尺
