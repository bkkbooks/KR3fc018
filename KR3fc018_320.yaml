body:
  text: 九百三十七爲益實四十一爲従方開無隅平方而一得梨又立天元一為果數如積求之得一萬四千六十三爲正實四十一爲益方上實下法而一得果又立天元一爲梨價如積求之得三萬二千九百二十三爲正實四十一爲益方開無隅平方除之得梨又立天元一爲果價如積求之得八十千三十六爲正實四十一爲益方上實下法而一合問或問院內鞦韆蹴起杆索未審髙低脚登畫板女嬌嬉離地板髙一尺只見送行兩步
