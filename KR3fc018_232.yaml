body:
  text: 又立天元一為茭草底子如積求之得三百四十七萬三千五百三十六為正寔六十四萬四千三百六十為益方一萬七千五十六為從亷六百三為從隅立方開之合問方圓交錯九問今有方圓田各一叚圓從古法二積相乘得一萬五千五百五十二歩只云方田面除圓田周得三歩問方靣圓周各幾何答曰方靣一十二歩圎周三十六歩
