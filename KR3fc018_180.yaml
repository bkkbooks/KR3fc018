body:
  text: 之得數為法實如法而一合問今有仰觀臺一所計積一萬八千五百二十八尺只云併上下袤為實平方開之得數減于上廣不及一丈三尺却于上下袤差同又如髙三分之乙上下廣差六尺欲興功補為圓臺上下斜表長就為圓徑限一日畢役每人常積二十七尺問上下廣袤及高大小四段弧積用徒各幾何答曰上廣二丈一尺下廣二丈七尺上袤二丈八尺
