body:
  text: 寔二十八益方四従亷一徔隅立方開之合問今有直積十二歩只云句弦和八歩问句弦較幾何答曰二歩術曰立天元一為句弦較如積求之得七十二為益实六十四為從方一十六為益亷一為正隅立方開之合問今有直積一十二歩只云句弦和八歩問股弦較幾何答曰一歩術曰立天元一為股弦較如積求之得九為正
