body:
  text: 實二十八益方四從亷一徔隅立方開之合問今有直積十二步只云句弦和八步問句弦較幾何答曰二步術曰立天元一為句弦較如積求之得七十二為益實六十四為從方一十六為益亷一為正隅立方開之合問今有直積一十二步只云句弦和八步問股弦較幾何答曰一步術曰立天元一為股弦較如積求之得九為正
