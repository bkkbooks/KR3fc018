body:
  text: 一萬八千一百六十為從上亷五千七百八十為從二亷二千三百七十五為益三亷七十益為四亷八為正隅五乘方開之合問今有句股弦各自乘減五和與倍之黃方羃適等只云五和加二句二股羃減八弦與半只五較羃少多弦和較相同問立方開十三事得幾何答曰四步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得三千七十三
