body:
  text: 一萬八千一百六十為従上亷五千七百八十為従二亷二千三百七十五為益三亷七十益為四亷八為正隅五乗方開之合問今有句股弦各自乗减五和與倍之黄方羃適等只云五和加二句二股羃减八弦與半只五較羃少多弦和較相同問立方開十三事得幾何答曰四步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得三千七十三
