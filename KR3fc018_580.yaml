body:
  text: 今有直積三乘方開之以平而一所得少平三步只云長以平方開之不及長八分之七問長平各幾何答曰平四步長六十四步術曰立天元一為平地元一為長天地配合求之得六十四為益實八十一為從二亷一百八為益三亷五十四為從四亷一十二為益下亷一為正隅六乘方開之得平合問今有直積减小平加小較以大平乘這如大長而一得數减小平餘有九案問數不合黨有錯步只云平羃
  hash: sha256:06a2a014e548b65f84f485b125f62fe34587281e77704bd574066f2ac0c143ff
