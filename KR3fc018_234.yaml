body:
  text: 術曰立天元一為方田靣如積求之得二萬七百三十六為益實一為正隅開三乘方除之得方田靣一十二步又立天元一為圎田周如積求之得一百六十七萬九千六百一十六為益實一為正隅三乘方開之得圎田周合問今有方圎田各一假圎後徽術共積二百四十七步一百五十七分步之二十九只云方靣自乘內加圓周共得一百八十步問圎周方靣各幾何答曰圎周三十六步方靣一十二步
