body:
  text: 術曰立天元一為方田靣如積求之得二萬七百三十六為益寔一為正隅開三乗方除之得方田靣一十二歩又立天元一為圎田周如積求之得一百六十七萬九千六百一十六為益寔一為正隅三乗方開之得圎田周合問今有方圎田各一叚圎後徽術共積二百四十七歩一百五十七分歩之二十九只云方靣自乗內加圓周共得一百八十歩問圎周方靣各幾何答曰圎周三十六歩方靣一十二歩
