body:
  text: 之以通徑除之所得為輞外周弦差以減外周餘即通弦內減池弦餘半之即慱徑合問如像招數五問今有官司差夫一千八百六十四人築堤只云初日差六十四人次日轉多七人每人日支米三升共支米四百三石九斗二升問築堤幾日答曰一十六日術曰立天元一為茭草底子如積求之得一千八百為益實六十七半為從方三半為從隅平
