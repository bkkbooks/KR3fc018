body:
  text: 問方面圎周各幾何答曰圎周三十六步方面一十二步術曰立天元一為圎田周如積求之得一億四千五百一十七萬七千二百為正實八十八為益方二十二萬六千六十五為益上亷八十八為正隅三乘方開之得圎周合問今有圎田各假圎徔古法圎田積加方田面於上又方田積加圎田周內減上餘六十步只云圎周方面相和四十八步問圎周方面各幾何
