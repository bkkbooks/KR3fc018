body:
  text: 今有圎田一段圎從古法上有圎池圎從寧率中有直池池邊下有方池各占之餘積一千八百六十八步四分九釐五毫二絲只云七池方靣不及一直池長五步四分四釐却多三直池闊二步二分四釐方池靣圎池周和舍得三十步直池斜與方池羃等問田池周徑長闊各幾何羅本空一文補之答曰圎田徑六十四步圎池周二十二步直池長六十一步四分四釐闊一十七步九分二釐
