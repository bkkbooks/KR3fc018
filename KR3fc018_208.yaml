  text: 分歩之二只云一和五平內减四長三較餘一歩一十二分歩之六問長平各幾何答曰平八歩三分歩之二長一十二歩四分歩之三術曰立天元一為平如積求之得二千二十八為益實二十七為従隅平方開之得平不盡按之分法求之合問今有直積加平减較餘一百一十五歩一十二分歩之一只云三長二平多於二和三較一十二分歩之六問長平各幾何
