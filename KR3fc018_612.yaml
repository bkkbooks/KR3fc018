body:
  text: 一千一百為従方三百為従亷九為益隅立方開之合問今有弦和較羃加句弦較羃比股羃少一叚句弦和只云弦和和羃減句股和乗弦和和加句弦較比二弦羃多一叚三相和問句股弦三事連環得幾何答曰一十二步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得四十八为益實四百二十四為従方八百五十一為益上亷
