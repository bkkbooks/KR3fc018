body:
  text: 一千一百為從方三百為從亷九為益隅立方開之合問今有弦和較羃加句弦較羃比股羃少一假句弦和只云弦和和羃減句股和乘弦和和加句弦較比二弦羃多一假三相和問句股弦三事連環得幾何答曰一十二步術曰立天元一為句地元一為股人元一為弦物元一為開數四象和會求之得四十八為益實四百二十四為從方八百五十一為益上亷
