body:
  text: 答曰七歩一百五十七分歩之一百五十一術曰立天元一為徽圎径如積求之得一百五十六萬二千五百為益寔二萬四千六百四十九為從隅平方開之不盡以連枝同體術求之今有平圎積四十五歩一十一分歩之九問為宻圎周幾何答曰二十四歩術曰立天元一為宻圎周如積求之得五百七十六為益寔一為正隅平方開之合問今有平圎積四十五歩一十一分歩之九問為宻
