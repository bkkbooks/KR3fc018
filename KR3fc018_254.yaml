body:
  text: 答曰七步一百五十七分步之一百五十一術曰立天元一為徽圎徑如積求之得一百五十六萬二千五百為益實二萬四千六百四十九為從隅平方開之不盡以連枝同體術求之今有平圎積四十五步一十一分步之九問為密圎周幾何答曰二十四步術曰立天元一為密圎周如積求之得五百七十六為益實一為正隅平方開之合問今有平圎積四十五步一十一分步之九問為密
