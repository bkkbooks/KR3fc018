body:
  text: 方二為從廉二為正隅立方開之得矢合問今有車輞田積以徑乘內周加之以外周乘徑減之又以徑冪乘之減徑冪餘以三千五百二十八步只云徑冪多為外周六步內外周差九步問各幾何答曰實徑六步內周二十一步外周三十步術曰立天元一為輞徑如積求之得三千五百二十八為益實一為益上廉一十九步半為益二廉一為正隅回乘方開之實徑合問今有錢田積幂加一池方面減四錢田積餘一十
