body:
  text: 今有句股積三十步只云句股和一十七步問弦較較幾何答曰六步術曰立天元一為弦較較地元一為較天地配合求之得一萬四千四百為正實四百三十六為益上亷一為從隅三乘方開之合問今有句股積三十步只云句股和一十七步問句羃幾何答曰二十五步術曰立天元一為句羃地元一為句天地配合
