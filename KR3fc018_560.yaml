body:
  text: 今有直積加小和小較减大和大較餘五十二步只云大長加小和小較平方開之不及大平二步問長平各幾何答曰平六步長一十二步術曰立天元一為平地元一為長天地配合求之得九十六為正實六十八為從方一十四為益上亷六為從下亷一為益隅三來方開之得平合問今有直田長自乘减和餘九步只云平自乘减較餘八步問長平各幾何
