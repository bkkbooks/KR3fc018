body:
  text: 水上一尺無零葮蒲稍接水齊平借問三般怎定答曰水深一丈二尺蒲長一丈三尺葮長一丈五尺術曰立天元一為水深如積求之得二千一百六十為正實一百九十二為益方一為正隅平方開之合問又立天元一為蒲長如積求之得二千三百五十三為正實一百九十四為益方一為正隅平方開之合問又立天元一為葮長如積求之得二千七百四十五為正實一
