body:
  text: 水上一尺無零葮蒲稍接水齊平借問三般怎定答曰水深一丈二尺蒲長一丈三尺葮長一丈五尺術曰立天元一爲水深如積求之得二千一百六十爲正實一百九十二爲益方一爲正隅平方開之合問又立天元一爲蒲長如積求之得二千三百五十三爲正實一百九十四爲益方一爲正隅平方開之合問又立天元一爲葮長如積求之得二千七百四十五爲正實一
