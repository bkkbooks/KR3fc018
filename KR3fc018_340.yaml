body:
  text: 從三廉一為正隅四乘方開之合問今有茭草五萬三百八十八朿欲令嵐峯更落一形埵之問底子幾何答曰一十六朿術曰立天元一為嵐峯更落一底子如積求之得六百四萬六千五百六十為益實六為從方三十五為從上廉五十為從二廉二十五為從三廉四為正隅四乘方開之合問今有茭草一直錢二十五貫五百七十八文只云最上一朿直錢九文次下層層每
