body:
  text: 匹長又立天元一為綾匹長如積求之得三十五萬八千八百二十六為益實五為益方一十一為從上亷六為益下亷一為正隅三乘方開之得綾匹長又立天元一為紬匹長如積求之得三十五萬八千七百八為益實一百五十三為益方七十一為從上亷一十四為益下亷一為正隅三乘方開之得紬匹長合問今有米麥豆共糶得錢三貫四百八文只云米取弱半麥取太半豆取中半共得二十八斗又米取中半麥取少半豆
