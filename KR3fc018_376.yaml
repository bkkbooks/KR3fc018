body:
  text: 答曰甲截長一百五步截闊七十一步乙截長六十五步截闊八十四步丙截長二十五步截闊八十九步丁截長一十五步截闊九十二步術曰立天元一為甲截長如積求之得六萬三千五百二十五為益實五百為從方一為從隅平方開之得甲截長又立天元一為乙截長如積求之得一萬七十五為益實一百四十二為從方二分為從隅平方開之得乙截長又立天元一為丙截長如積求之得四千三百二
