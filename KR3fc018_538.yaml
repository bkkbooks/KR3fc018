body:
  text: 答曰一十八步術曰立天元一為句弦和地元一為句天地配合求之得三千六百為益實三千七百六為益方七十一為益上亷三十四為從下亷一為益隅三乘方開之合問今有句股積三十步只云句股和一十七步問股弦和幾何答曰二十五步術曰立天元一為股弦和地元一為股天地配合求之得三千六百為正實三千七百六為從
