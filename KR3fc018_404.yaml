body:
  text: 已招四千九百五十人支米九百三十一碩二斗問招來幾日答曰一十五日術曰立天元一為三角底子如積求之得四千八百四十九為益實四十八為從方一十二為從廉一為從隅立方開之得三角底子一十三箇加二即日數米求日術曰立天元一為三角落一底子如積求之得九萬二千八百二十為益實三百二十六為從方一百二十一為從上廉一十八為從下廉一為從隅三乘方開之
