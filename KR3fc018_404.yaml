body:
  text: 已招四千九百五十人支米九百三十一碩二斗問招來幾日答曰一十五日術曰立天元一為三角底子如積求之得四千八百四十九為益實四十八為従方一十二為従㢘一爲従隅立方開之得三角底子一十三箇加二即日數米求日術曰立天元一為三角落一底子如積求之得九萬二千八百二十爲益實三百二十六為従方一百二十一為従上㢘一十八為従下㢘一爲従隅三椉方開之
