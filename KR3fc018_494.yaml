  text: 今有圭田梯田各一叚共八畆一十五分畆之八只云梯取大闊六分之五小闊取三分之二為共减長八分之三餘二十二步又大闊取三分之一長取四分之三為共减小闊六分之五餘四十步又小闊取三分之一長取八分之五為共减大闊四分之三餘二十一步又倍圭長與圭闊羃等問圭田長闊各幾何答曰圭田長三十二步闊八步
