body:
  text: 只云句乘股羃以股除之加直積减句羃以句除之與弦同問弦較較乘直積得幾何答曰四十八步術曰立天元一為句地元一為股人元一為開數三才相配求之得六千為正實四萬六千七百八十一為益方九百七十二為從隅平方開之合問今有直積减句股和以句乘之加句股較减直積以股除之加句股和以股乘之加股
