body:
  text: 答曰上廣一丈下廣一丈八尺髙一丈二尺袤五百八十尺術曰立天元一為堤高如積求之得四萬二十為益實二十五為益方五十二為從上亷五為益下亷二為從隅三乗方開之得堤髙合問今有造仰觀䑓一所只云上下袤差一丈四尺併上下廣虚加二為實六為從方一為從隅平方開之不及上廣八尺上袤多扵上廣二分之一髙多下袤七尺每日用徒二百二十七人每人日程常積二十四尺
