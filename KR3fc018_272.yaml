body:
  text: 答曰四步術曰立天元一為弦較較如積求之得一百九十二為益實一百二十八為從方二十四為益亷一為正隅立方開之合問今有直積一十二步只云句弦和八步問句較較幾何答曰二步術曰立天元一為句較較如積求之得八為正實八為從方八為益亷一為正隅立方開之合問今有直積一十二步只云句弦和八步問句股和
