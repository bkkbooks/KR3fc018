  text: 答曰四歩術曰立天元一爲弦較較如積求之得一百九十二爲益實一百二十八爲従方二十四爲益亷一爲正隅立方開之合問今有直積一十二歩只云句弦和八歩問句較較幾何答曰二歩術曰立天元一爲句較較如積求之得八為正實八爲従方八爲益亷一爲正隅立方開之合問今有直積一十二歩只云句弦和八歩問句股和
