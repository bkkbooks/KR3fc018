body:
  text: 得一十八步問弦和和幾何答曰五十六步術曰立天元一為弦和和如積求之得三十千一百三十六為益實一為從隅平方開之合問今有直積一百八步只云弦較較乘句弦較得七十二步開弦和較幾何答曰六步術曰立天元一為弦和較如積求之得五千一百八十四為益實一百四十四為從隅平方開之合問
