body:
  text: 步只云平幂與較等問長平各幾何荅曰平五步長三十步術曰立天元一為平如積求之得一十五萬五千八百五為益實九為益方七十四為従上㢘一百六十二為従二㢘九十九為従三㢘一十八為従下㢘一為正隅五乗方開之得平合問今有積加三平減一較餘自乘減三平加一較得七萬八千四百一十四步只云平自乗與和等問長平各幾何
