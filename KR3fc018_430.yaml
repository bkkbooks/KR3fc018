body:
  text: 闊一箇問上下長闊及髙各幾何答曰上長四箇下長八箇下闊五箇髙五箇術曰立天元一為上長如積求之得一百二十為益實二為從方五為益上廉一為益下廉一為正隅三乘方開之合問今有圓錐果子一所令甲乙丙分之甲分五百八箇乙分四百一箇丙分二百一十五箇從上給丙次中給乙次下與甲問各分層數幾何
