body:
  text: 十四為益寔一為正隅立方開之不盡命分合問今有立方面八尺七分尺之二問為立羃幾何答曰五百七十四尺術曰立天元一為立羃如積求之得一十九萬六千八百八十二為正寔三百四十三為益方無隅平方開之合問明積演叚二十問今有直積十二歩只云句弦和八歩問句股較幾何答曰一歩術曰立天元一為句股較如積求之得二十三為正
