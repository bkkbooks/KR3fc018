body:
  text: 術曰立天元一為大闊如積求之得四千六十四為益實五十為益方三為従㢘一為正隅立方開之得大闊合問今有圭田積減四長餘五十六步只云較自椉減闊幂餘與長等問長闊各幾何答曰闊一十二步長二十五步術曰立天元一為圭長如積求之得二百為益實一十七為益方一為正隅平方開之得長合問
