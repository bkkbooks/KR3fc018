body:
  text: 今有句股田一假句闊一十八步股長二十四步今欲從句內容圓池一所問容池周幾何答曰三十六步術曰立天元一為容池周如積求之得七千七百七十六為正實二百五十二為益方一為正隅平方開之合問今有句股田一假句闊六步股長一十二步今欲從句容方池一所問容方靣幾何答曰四步
