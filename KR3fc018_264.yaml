body:
  text: 術曰立天元一為平方面如積求之得二百六十五為益實一為正隅平方開之不盡命分合問今有平方靣一十六尺一十一分尺之三問為平羃幾何答曰二百六十五尺術曰立天元一為平羃如積求之得三萬二千六十五為益實一百二十一為從方上實下法今有立羃五百七十四尺問為立方面幾何答曰八尺七分尺之二術曰立天元一為立方面如積求之得五百七
