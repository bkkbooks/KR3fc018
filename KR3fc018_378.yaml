body:
  text: 十五為益實一百六十八為從方二分為從隅平方開之得丙截長又立天元一為丁截長如積求之得二千七百一十五為益實一百七十八為從方二分為從隅平方開之得丁截長今有弧田一段弦長七十步矢闊二十五步今從弧背復截弧矢積二十六步問截弦矢各幾何答曰截弦二十四步截矢二步術曰先求得圎徑七十四步立天元一為截矢如積求之得二千七百四為益實一百
