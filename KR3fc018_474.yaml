body:
  text: 二千七百六十八為益實二千五百四十四為益方一千八百八十八為従上亷六百一千六為益二亷七十二為従下亷一為正隅四來方開之得䑓髙合問今有圭田一段闊一十四步長二十四步於內欲容圎池一所問池徑幾何答曰一十步二分步之一術曰立天元一為容池圎徑如積求之得一千一百七十六為益實四十九為従方六為従隅平方開之合問
