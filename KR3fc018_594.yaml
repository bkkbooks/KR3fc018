body:
  text: 句羃以句除之與弦同問五和五較一積一弦共一十二事連環得幾何答曰六十九步術曰立天元一為句地元一為股人元一為開數三才相配求之得一萬五千一百八十為正實二千八千三為益方二十七為正隅平方開之合問今有直積減句股和以句乘之加句股較減直積以股除之加句股和以股乘之加股以句除之減二股一句股較與句等
