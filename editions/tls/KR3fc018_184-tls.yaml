body:
  text: 之長倍上長加下長以上廣乗之扵上又倍下長加上長以下廣乗之加上以髙乗之加如六而一得二大弧之積如每人常積除之得用徒求二小弧積及用徒者如前術入之即得合問今有造龍尾堤一所只云高多上廣二尺如下廣三分之二髙併上廣自乗不及袤九十六尺每人日程常積二十九尺用徒一千八百四十人即一日役畢問堤上下廣及髙袤各幾何
