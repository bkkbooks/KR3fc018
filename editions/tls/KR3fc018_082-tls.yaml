body:
  text: 㢘七十為益五㢘一為益隅七椉方開之得股今有弦和較椉弦和和加句弦較椉句弦和得四十步只云句幂與股弦和等問弦㡬何答曰五步術曰立天元一為弦如積求之得一千五百二十五為正實一百四十為従方五十四為益上㢘一十二為益下㢘一為正隅三椉方開之得弦合問今有積減弦和較餘一十步只云句股和七步問
