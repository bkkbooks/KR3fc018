body:
  text: 之得一千八十爲正實七十二爲益方上實下法而一得弦合問今有直積一百八歩只云五和五較相乗得三千七百八十歩問弦幾何答曰一十五歩術曰立天元一爲弦如積求之得七千九百七十四億九千三百六十五萬六百二十五爲益實七十五億二千二百八十四萬二千六百為従上亷二千五十二萬四十千九百九十五為益三亷一萬二千六百三十六爲従隅五乗方開
