body:
  text: 今有句弦相乘加句股較平方開之與股適等只云股弦相乘减弦和和立方開之與句弦較同問句弦各幾何答曰句三步股四步術曰立天元一為句地元一為股弦較天地配合求之得六為益實一十四為從方一百一十為従上亷六百二十為益二亷一千五百二十為従三亷二千四百四十六為益四亷二千七百四十七為従五亷一千九百三十二為益六亷六百七十一為従七亷二十二為従八亷六
