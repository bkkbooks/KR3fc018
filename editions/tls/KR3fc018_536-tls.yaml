body:
  text: 問三事各幾何答曰立圎徑二十四尺立方靣二十八尺平方靣一十六尺術曰立天元一為立圎徑如積求之得一千二百九十五萬三千八十八為益實一百九十二為從亷九百二十九為從隅立方開之得立圎徑合問兩儀全轍一十二問今有句股積三十步只云句股和一十七步問句弦和幾何
