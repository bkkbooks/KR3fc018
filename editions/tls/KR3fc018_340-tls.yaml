body:
  text: 従三㢘一爲正隅四乘方開之合問今有茭草五萬三百八十八朿欲令嵐峯更落一形埵之問底子幾何答曰一十六朿術曰立天元一爲嵐峯更落一底子如積求之得六百四萬六千五百六十爲益實六爲従方三十五爲從上廉五十爲従二㢘二十五爲從三㢘四爲正隅四乘方開之合問今有茭草一直錢二十五貫五百七十八文只云最上一朿直錢九文次下層層每
