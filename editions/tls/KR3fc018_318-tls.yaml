body:
  text: 問此壺斗當元多少酒答曰一㪷七升八合一勺二抄五撮術曰立天元一為当充壺中酒如積求之得二百八十五為益寔一十六為徔方上寔下法而一合问或問九百九十九文錢及時梨果買一千一十一文梨九筃七枚果子四文答曰梨六百五十七筃價八百三文果三百四十三枚價一百九十六文術曰立天元一為黎數如積求之得二萬六千
