body:
  text: 術曰立天元一爲方圎箭外周如積求之得五百七十六爲益實一爲正隅平方開之合問今有方圎箭各一朿共積九十七隻只云方箭外周如圎箭外周六分之五問方圎周各幾何答曰方周二十隻圎周二十四隻術曰立天元一爲方箭外周如積求之得一十一萬四千爲益實一千三百二十爲従方二百一十九爲従隅平方開之得方周合問今有方圎箭各一朿共積六十二隻只云圎外箭
