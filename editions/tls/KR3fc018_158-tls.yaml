body:
  text: 尺又多囤圓徑三分之一却與囤髙等問倉囤髙深長廣各幾何按三分之一當作三分之二答曰倉廣一丈八尺長二丈二尺深一丈六尺囤徑一丈二尺髙一丈八尺周三丈六尺術曰立天元一為倉廣如積求之得一萬二千四百二十為益實一十二為益方三為從亷二為正隅立方開之得倉廣合問今有方倉四圓囤五受粟四千七百六十八斛只云倉長取中半自乘减七尺餘與囤
