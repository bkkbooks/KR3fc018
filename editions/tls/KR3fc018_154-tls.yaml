body:
  text: 術曰立天元一為倉長如積求之得二千一百六十為益實九為從方六為益亷一為正隅立方開之得倉長合問今有圓囤貯粟三百六十四斛五分斛之四只云上周如下周太半髙如下周少半問周髙各幾何答曰上周二丈四尺下周三丈六尺髙一丈一尺術曰立天元一為上周如積求之得一萬三千八百二十四為益實一為正隅立方開之得
