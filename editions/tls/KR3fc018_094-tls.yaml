body:
  text: 為正實三十六為正方一為正隅平方開之得弦合問今有積減平以積椉之又減五平四積餘二十七萬九千六百三十步只云長取五分之一平取三分之二其長分子数如平分子数二分之一問長平各幾何答曰平一十八步長三十步術曰立天元一為平如積求之得五十萬三千三百四十步為益實九為益方一十二為益上㢘三為益下㢘五為正隅三椉方開之得平合
