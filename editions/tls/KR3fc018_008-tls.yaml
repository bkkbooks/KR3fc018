body:
  text: 數一而巳一者萬物之所從始故易一太極也一而二二而四四而八生生不窮者豈非自然而然之數邪河洛圖書泄其秘黄帝九章著之書其章有九而其數則二百四十有六始方田終句股包括三才㫄通萬有凡言數者皆莫得而逃焉如厤之大衍書之厤象詩之萬億及秭記禮之三千三百周官之三百六十數之見扵經者盖不特黄帝九章為然也自後世明算之科不設而此學寖失其傳由是厤法之進退畸盈農田之方圎曲直以至斗升勺合毫釐絲忽
  hash: sha256:f0b27cc940b000f9b9368908a4c01fc2809e38dfb1139aaeca2f719525ba21a7
