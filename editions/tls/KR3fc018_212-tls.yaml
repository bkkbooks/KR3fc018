body:
  text: 亷二十四為從隅立方開之得平不盡按之分法求之合問今有直積自乗减和羃餘一萬一千七百五十一歩一百四十四分歩之八十三只云較不及平四歩一十二分歩之七問長平各幾何答曰平八歩三分歩之二長一十二歩四分歩之三術曰立天元一為平如積求之得一百六十九萬五千二百五十二為益實三千九百六十為従方一千七百二十九従上亷二千六百四十
