body:
  text: 五至隅頭借問長平数目事答曰長一十六步闊一十五步術曰立天元一爲長地元一爲平天地配合求之得五萬七十六百爲正實二千八百八十爲益方一百七十三爲益上廉八爲一益下廉一爲正隅三乘方開之得長又立天元一爲闊地元一爲長天地配合求之得五萬七十六百爲正實一千九百二十爲益方一百七十三爲益上廉一十二爲益下廉一爲正隅三乘方開之得闊合問
