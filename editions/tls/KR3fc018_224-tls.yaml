body:
  text: 太半如方箭外周中半三角四角底靣相和得三十三箇平圎径多於四角底靣七分之四問九事各幾何答曰三角底子一十五箇四角底子一十八箇方箭外周二十四隻圎箭外周一十二隻平圎径四十二尺立圎径一十六尺平方靣三十五尺立方靣一十四尺茭草底子一十六束術曰立天元一為三角底子如積求之得二百八十四萬六千八百三十五為正實六十萬八
