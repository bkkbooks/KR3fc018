body:
  text: 朿累貴三文問底子幾何答曰二十八朿術曰立天元一爲茭草底子如積求之得一十五萬三千四百六十八爲益實二十一爲従方二十七爲従㢘六爲従隅立方開之合問今有茭草一直錢四十二貫八百四十六文只云最下每朿直錢文六次上層層每朿累貴五文問底子幾何答曰三十六朿術曰立天元一爲茭草底子如積求之得二十
