body:
  text: 寓燕松庭朱氏傑漢卿編述臨川琴屋鐘燁叔明較正果疊藏二十問今有三角果子一所直錢一貫三百二十文只云従上一箇直錢二文次下層層每箇累貴一文問底子每靣幾何答曰九箇術曰立天元一為每靣底子如積求之得三萬一千六百八十為益實十為従方二十一為従
