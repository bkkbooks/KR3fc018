body:
  text: 術曰立天元一爲椽数如積求之得二千七十爲益實一爲益方一爲従隅平方開之得椽数又立天元一爲每株椽價如積求之得一萬八千六百三十爲益實三爲從方一爲正隅平方開之合問或問方城里週六十四假使金塼遍鋪地每條均鑄厚一寸長闊相和恰一尺寸金十五兩爲法尚帶零株一十八每塼計重十七斤一十五兩六銖答七絲二黍在其中共是一塼之重率長闊余
