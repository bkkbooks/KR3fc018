body:
  text: 四十爲正實四十爲益方上實下法而一得城髙求表去城者以前表退行乗表間爲實兩表退行差爲法實如法而一合問今有方城上有戍樓不知髙逺立兩表齊髙一丈五尺表間相去八十歩令前表與後表參相直人目髙四尺於前表退行三十歩遙望樓岑與前表末參合復望樓足入表五尺六寸又從後表退行五十歩遙望樓岑與後表末參合問城樓答各幾何
