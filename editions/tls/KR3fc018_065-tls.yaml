body:
  text: 四象會元今有句股椉五較與弦羃加句椉弦等只云句除五和與股羃減句弦較同問黃方帶句股弦各幾何荅曰一十四步草曰立天元一為句地元一為股人元一為弦物元一為開數四象求得求得三和會求之求得今式云式元之式求得物四式和會消而剔之式云之式皆物易天位得前式
