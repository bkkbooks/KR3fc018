body:
  text: 立天元一為少半兩價如積求之得二百八十二萬二千四百八十四為益實二為從方四為從上亷四為益下亷一為正隅三乘方開之得四十二文以四十八乗之即斤價合問今有三斜田一叚只云併大斜一中斜二减小斜四餘一十五步又併大斜二小斜三减中斜五少一十五步又併中斜二小斜一减大斜二餘一十五步問中股幾何答曰中股三十六步
