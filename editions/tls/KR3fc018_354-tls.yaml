body:
  text: 平方開之得圎周合問撥換截田一十九問今有半種金田一段長五十步斜闊一十步與隣對撥圭田一段只云併圭田長闊較爲正實一十五爲益方一爲正隅平方開之少如較四步問圭田長闊各幾何答曰長二十五步闊一十六步術曰立天元一爲半種金田之中股如積求之得二千四百爲正實一百爲從方五十爲益隅
