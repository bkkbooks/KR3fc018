body:
  text: 二步一千八百一十五步只云博徑三步問池方田周各幾何荅曰池方一十八步田周九十步術曰立天元一為池方為積求之得四十八步四千七百七十六為益實以前八百四為従方四百二十四為従上㢘三十六為従下㢘一為徑隅三椉方開之得池方合問今有環田積實徑椉外周加之却見內周冪餘七百二十九步只云併內外周減二餘以平方開之所得不及實徑一步問
