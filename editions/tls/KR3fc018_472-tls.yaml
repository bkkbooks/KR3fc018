body:
  text: 方数合問今有圎田一段內有圎池池中後有圎亭臺各占之三積共九千五百四尺只云壹池二周皆以平方開之相併自之與外田周等其臺周開方数如池周開方数二分之一不及臺髙二尺問三圎周及臺髙各幾何答曰田周三百二十四尺池周一百四十四尺臺周三丈六尺臺髙八尺術曰立天元一為臺髙如積求之得一十一萬
