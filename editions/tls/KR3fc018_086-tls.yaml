body:
  text: 㢘九為益隅立方開之得長合問今有積加長以半平椉之得一千九百五十步只云長五分之三減平三分之二餘七步問長平各㡬何答曰平一十二步長二十五步術曰立天元一為長如積求之得一十三萬為益實三千三百二十五為従方六百為益㢘二十七為従隅立方開之得長合問今有積加三較以長椉之減三平餘九千七百四十四步只云長取太半平取弱半為
