body:
  text: 三寔八為益方開隅平方而一得醨酒又立天元一為飲醇酒人數如積求之得九十為三实一為益方之寔下法而一得醇酒人又立天元一為飲醨酒人數如積求之得三百一十為益寔為従方開隅平方而一得醨酒人數小尽考約之合問或問今有直田一畝足向中間生竿竹四角至竹各十三借问四事元數目答曰長二十四步阔一十步術曰立天元一為長如積求之得五萬七千六
