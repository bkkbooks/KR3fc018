body:
  text: 今有句三歩十分歩之九股五歩五分歩之一問弦幾何答曰六歩二分歩之一術曰立天元一為弦如積求之得一十萬五千六百二十五為益實二千五百為從隅平方開之得弦不盡按連枝同體術求之合問今有股五歩五分歩之一弦六歩二分歩之一問句幾何答曰三歩十分歩之九術曰立天元一為句如積求之得一千五百二十一
