body:
  text: 丙九百四十文丁一百五十文戊二文術曰立天元一為一分之率如積求之得九百四十為益實一萬九千七百三十九為益方二十一為從隅平方開之得九百四十文為一分之率合問今有木圎毬一隻徑一尺八寸欲令漆之先用布䪌布闊二尺問用布長幾何答曰三尺六寸二十分寸之九術曰立天元一為布長如積求之得七尺二寸
