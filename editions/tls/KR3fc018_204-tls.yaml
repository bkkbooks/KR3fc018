body:
  text: 各幾何答曰平八歩三分歩之二長一十二歩四分歩之三術曰立天元一為長如積求之得一千九百八十九為益實三為從方一十二爲從隅平方開之得長不盡按之分法入之合問今有直積一百一十歩二分歩之一只云平取八分之三長取九分之四共得八歩一十二分歩之一十一問長平各幾何答曰平八歩三分歩之二長一十二歩四分歩之三術曰立天元一爲長如積求之得三萬五千八
