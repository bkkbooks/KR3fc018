body:
  text: 㢘七十二為従五㢘六為益七㢘一十八為正隅八椉方開之得二步即開方數六之得長今有積以和椉之減積餘以平求之加和得一十七萬七千一百六十二步只云和為益實四為益方三為従上㢘二為益下㢘一為正隅如平四分之一問長平各幾何荅曰荅平一十二步長三十步術曰立天元一為開方數如積求之得一十七萬七千一百六十二為益實四為益方三為従上㢘一百二十六為従二㢘四百六十五為従
