body:
  text: 益方九萬三千六百三十二為徔上亷四千七百四十一為益下亷七十七為徔隅三乗方開之得圎周合問今有方圎田各一叚圎徔古法方田積內减圎田積餘以圎田径乗之得四百三十二歩只云方田周虛加一算平方開之不及圎田径五歩問方面圎周各幾何答曰圎周三十六歩方面一十二歩術曰立天元一為圎田徑如積求之得六千九百一十二為益寔五百七十六為徔方四百八
