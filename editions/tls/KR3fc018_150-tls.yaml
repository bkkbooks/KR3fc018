body:
  text: 乘方開之得五為疋長開方数合問今有綾羅共三丈各直錢八百九十六文只云綾羅各一尺共直錢一百二十文問綾羅尺價各幾何答曰綾一丈四尺尺價六十四文羅一丈六尺尺價五十六文術曰立天元一為綾尺数如積求之得二百二十四為正實三十為益方一為正隅平方開之得綾尺数又立天元一為綾尺價如積求之得三千五百八十四為益實一百二十為從方一為益隅平方開之得綾尺價又立天元一為羅
