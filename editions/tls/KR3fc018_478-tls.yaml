body:
  text: 術曰立天元一為容方靣如積求之得七十二為益實一十八為従方開無隅平方而一合問今有梯田一叚小闊八步大闊三十二步長二十二步半欲於大闊容圎池一所問容池徑幾何答曰一十九步二分術曰立天元一為大闊容圎徑如積求之得一十三萬八千二百四十為益實四千六百八為従方一百三十五為従隅平方開之合問
