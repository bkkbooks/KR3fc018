body:
  text: 共不及一長四步問長平各幾何答曰平一十六步長二十四步術曰立天元一為長如積求之得二萬九千八十八為益實一百三十二為従方五十一為益㢘四為正隅立方開之得長合問今有積幂減平餘一萬一千六百五十五步只云長四分之一平三分之一和二分之一共得一十六步二分步之一問長平各幾何答曰平九步長一十二步
