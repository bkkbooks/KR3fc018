body:
  text: 七分歩之一十六問長平各幾何答曰長五歩三分歩之二闊三歩四分歩之三術曰立天元一為長如積求之得三千七百五十七為益實一百一十七為従隅平方開之得長不盡桉之分法求之合問今有直積一百一十歩二分歩之一只云長平和二十一歩一十二分歩之五問長平各幾何答曰平八歩三分歩之二長一十二歩四分歩之三術曰立天元一為平如積求之得一千三百二十
