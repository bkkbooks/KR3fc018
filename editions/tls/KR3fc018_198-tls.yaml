body:
  text: 為益實一百為従隅平方開之得句不盡按之分法求之合問今有弦六歩二分歩之一句三歩十分歩之九問股幾何答曰五歩五分歩之一術曰立天元一為股如積求之得二千七百四為益實一百為從隅平方開之得股不盡按之分法入之合問今有直積一十八歩一十二分歩之五只云長取四分之三闊取三分之一為共如長一十
