body:
  text: 今有圎材徑三尺只云鋸道長一尺八寸問深幾何答曰三寸術曰立天元一為鋸深如積求之得八十一為正實三十為益方一為正隅平方開之合問今有天上鴈三群地上鴈一群共三百一隻只云頭群次群共二百五十六隻又以次群除頭群所得加地上鴈與末群同地上鴈不及次群四十三隻問四群各幾何答曰頭群一百九十二隻次群六十四隻
