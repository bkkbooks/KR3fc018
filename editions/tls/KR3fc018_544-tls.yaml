body:
  text: 今有句股積三十步只云句股和一十七步問句弦較幾何答曰八步術曰立天元一為句弦較地元一為句天地配合求之得三千六百為益實三千七百六為従方七十一為益上亷三十四為益下亷一為益隅三乗方開之合問今有句股積三十步只云句股和一十七步問股弦較幾何答曰一步
