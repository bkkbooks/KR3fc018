body:
  text: 闊一箇問上下長闊及髙各幾何答曰上長四箇下長八箇下闊五箇髙五箇術曰立天元一為上長如積求之得一百二十為益實二為従方五為益上㢘一為益下㢘一為正隅三椉方開之合問今有圓錐果子一所令甲乙丙分之甲分五百八箇乙分四百一箇丙分二百一十五箇従上給丙次中給乙次下與甲問各分層数幾何
