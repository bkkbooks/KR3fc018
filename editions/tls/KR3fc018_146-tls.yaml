body:
  text: 開之得匹長又立天元一為尺價如積求之得二千九百七十五為益實五十為益方一為正隅平方開之得尺價合問今有錢一百六十二貫五百六十文買布不知疋数只云每疋牙錢五文今無牙錢凖布二疋問共布及匹價各幾何答曰共布二百五十六疋匹價六百三十五文術曰立天元一為共布如積求之得六萬五千二十四為益實二為益方一為從隅平方開之得共布之数又立天元一為匹價如積求之
