body:
  text: 数餘卽甲分層數合問今有四角果子一所令甲乙丙分之甲分五百九十箇乙分四百四十六箇丙分二百四箇従下給甲次中與乙次上與丙問各分層數幾何答曰甲三層乙四層丙八層術曰立天元一為共髙層数如積求之得七千四百四十為益實一為従方三為従㢘二為従隅立方開之得共髙層數又立天元一為丙分層数如積求之得一千二百二十四為益實
