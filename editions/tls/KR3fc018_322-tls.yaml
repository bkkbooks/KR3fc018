body:
  text: 板髙三尺無竒杆繩長短怎生知除演天元如積答曰杆長二丈七尺索長二丈六尺術曰立天元一爲杆長如積求之得一百八爲正實四爲益方開無隅平方除之得杆長又立天元一爲索長如積求之得一百四爲正實四爲益方上實下法而一合問或問六貫二百一十錢倩人去買幾株椽每株脚錢三文足無錢準與一株椽答曰椽四十六株株價一百三十五文
