body:
  text: 九十萬九千七百六十爲従二㢘一百二十四億五千一百八十六萬八千六十四爲益三㢘九億二千二百七十四萬三千三百六十爲益四㢘四百九十五萬五千六百六十四爲益五㢘八萬二千三百二十爲従下㢘二千四百一爲従隅七乘方開之得截池矢六步倍之以減池矢餘自乘復減池徑羃餘爲實平方開之得截池弦又池矢自乘倍之以池徑除之得數爲池周弦差加池弦得輞內周以減內外周相和之數餘卽外周又池矢加實徑爲通矢自乘倍
