body:
  text: 爲益上㢘三百六十爲益下㢘五爲正隅三乗方開之得甲截矢九步列甲積通分納子內減矢羃餘以矢除之即甲截弦又立天元一爲共截矢如積求之得二百六十二萬四千四百爲益實三千二百四十爲従上㢘三百六十爲從二㢘五爲益隅三乘方開之得共截矢一十八步內減甲截矢餘卽乙截矢又共矢自之以減甲乙併積通分內子之數除以共矢而一即乙截弦合問今有圎田一段甲東截一弧計積三十一步中半
