body:
  text: 為平方靣如積求之得三百九十為益實三十二為從方一十六為益亷五為從隅立方開之得平方靣又立天元一為立方靣如積求之得三百四十八為益實二十九為從方一十四為從亷五為從隅立方開之得立方面合問雜範類會一十三問今有沉香立圓毬一隻徑一尺今從頂截周八寸答曰四分問厚幾何答曰二分術曰立天元一為截頂厚如積求之得一寸九
