body:
  text: 術曰立天元一為方田面如積求之得二億八千九百七十四萬四千一百二十八為益寔一萬三千九百七十三為正隅三乗方開之合問今有方圎田各一叚圎徔宻率方田積內减方田面圎田積內减圎田周二餘數相乗得八千八百五十六歩只云方面不及圎周二十四歩問方面圎周各幾何答曰圎周三十六歩方面一十二歩術曰立天元一為圎田周如積求之得八百五十七萬二千六百八為益寔五十八萬八百為
