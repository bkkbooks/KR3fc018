body:
  text: 周相較之多四步又併中周二實徑四直斜一與二箇外周相較之少六步問直田長平各幾何答曰直田長七十步闊二十四步術曰如方程正負術入之左行得直田斜次行得實径次行得中周右行求外周又環積减共積餘為直積立天元一為闊如積求之得二百八十二萬二千四百為正實五千四百七十六為益上亷一為正隅三乘方開之得闊又立天元一為長如積求之得二百八十二萬二
