body:
  text: 方開之得茭草一十五朿加一即日數米求日者立天元一爲三角底子如積求之得八萬四百爲益實五百九十爲従方二百一十三爲従㢘七為従隅立方開之得三角底子一十五箇加一即日數合問今有官司依平方招兵初段方面四尺次日方面轉多二尺每人日給銀一兩二錢已招兵四千九百五十六人支銀二萬六千四十兩問招來幾日答曰一十四日
