body:
  text: 中股幾何荅曰八步術曰立天元一為中股如積求之得一億三千三百四十四萬八千七百四為益實七百二萬三千六百一十六為益方八十四萬三千二百九十六為従上㢘二十七萬八千七百六十八為従二㢘五千三百七十一步七分五釐為従三㢘四百九十五為益下㢘四十九為益隅五椉方開之得中股合問今有句三股四八角田積以靣開案當做澖三自椉加之却闊
