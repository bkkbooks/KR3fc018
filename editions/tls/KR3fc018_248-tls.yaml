body:
  text: 答曰圎周三十六歩方面一十二歩術曰立天元一為開方數如積求之得一萬一百八十八為益寔一千八百八十四為徔方一萬四百八十八為從上亷二千七十二為徔二亷二百二十五為徔三亷四百五十為益下亷七十五為益隅五乗方開之得開方數三歩四之即方田面合問今有圎田各一叚圎徔宻率圓田積內加二箇圎田周减一叚方田積餘數於上又方田積內加二箇方田靣减一叚圎田積
