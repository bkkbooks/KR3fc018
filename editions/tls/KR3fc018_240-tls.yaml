body:
  text: 答曰圎周三十六歩方面一十二歩術曰立天元一為圎田周如積求之得二萬六千三百五十二為正寔一千一百二十八為益方一十一為正隅平方開之得圎田周合問今有方圎田各一叚圎從徽術方田羃內减圎田積餘以方田羃乗之得五千八百七十七歩一百五十七分歩之六十三只云方田面如圎田周三分之一問方田面圎田周各幾何答曰方面一十二歩圎周三十六歩
