body:
  text: 百六十二為益實一為益方一為正隅平方開之得尺價合周問今有錦一端直錢四貫八十文只文云併尺價端長為共以尺價乘之加端長共得一十一貫三百五十三文問各幾何答曰端長四尺丈八尺尺價八十五文術曰立天元一為端長如積求之得一千六百六十四萬六千四百為益實七千二百七十三為従亷一為益隅立方開之得端長合問今有錦一端一匹端長自乘內减匹長又匹長自
