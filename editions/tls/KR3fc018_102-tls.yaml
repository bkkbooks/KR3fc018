body:
  text: 實二千四百五十為従方一千三百八十六為益上㢘二百九十五為従二㢘二十八為益下㢘一為正隅四椉方開之得平合問今有積加一和三較以積椉之減一長二較又以長椉之得一十四萬七千二百一十六步只云平以立方開之如長六分之一問長平各幾何荅曰平八步長一十二步術曰立天元一為開方數如積求之得一萬二千二百六十八為益實九為益上㢘一為従三
