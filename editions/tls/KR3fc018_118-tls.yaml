body:
  text: 減靣問幂餘二萬一千二百八十三闊步五分步之一問每靣闊幾何荅曰一十二步術曰立天元一為每靣之闊如積求之得一十得萬六千四百一十六為益實一十九為従上㢘五為正隅三椉方開得每靣之闊也今有三廣田積加中廣二分之一減大廣三分之二又加小廣四分之三減正長六分之五餘以正長中半椉之得一萬五千八百八十八步只云併三廣正長
