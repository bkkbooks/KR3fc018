body:
  text: 荅曰周九十九步徑五十一步術曰立天元一為先開方數如積求之得三萬三千八百三十一為益實四百二十為従方二百一十四為益上㢘七十四為従下㢘一為益隅三椉方開之得九步為先開方數合問今有毬露錢田積加靣徑減圎周餘五十六步只云虚徑多如靣徑二步問三徑各幾何荅曰靣徑四步虚徑六步
