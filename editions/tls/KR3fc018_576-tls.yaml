body:
  text: 天元一為較地元一為長求得三為正實三為益方上實下法而一即較合問今有平乗直積與一長五和等只云長羃加較羃與一長三和等問長平各幾何答曰平三步長五步術曰立天元一為平地元一為長天地配合求之得一百八為益實三十六為從方三十六為從上亷一十二為益二亷三為益下亷一為正隅四乗方開之得平又立天元一為長地元一為平求得五為正實七十六為益方五十五
