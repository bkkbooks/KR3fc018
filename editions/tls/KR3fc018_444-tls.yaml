body:
  text: 九十二為正實三百七十八為従方一百一十九為益隅平方開之合問今有三角四角果子積相椉得二萬三千一百箇只云併三角四角底靣平方開之不及四角底靣三箇問二底靣各幾何答曰四角底靣七箇三角底靣九箇術曰立天元一為四角底靣如積求之得八十三萬一千六百為益實九百九十為従方八百七十七為従上㢘二千五百三十為益二㢘三百五十八為従三㢘一千四百二十六為従四
