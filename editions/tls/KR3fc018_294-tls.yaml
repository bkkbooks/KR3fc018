body:
  text: 十爲從下亷一爲正隅三乗方開之得二百四十歩倍之即長又立天元一為邑半闊如積求之得一十八億六千六百二十四萬爲正實二千七十三萬六千爲從方二十七萬爲益上亷三百六十爲從下亷一爲正隅三乗方開之得一百八十歩倍之即闊合問今有圓城不知大小各中開門甲乙俱從城心而出甲出南門一十五歩而立乙出東門四十歩見甲問城圓幾何答曰一里
