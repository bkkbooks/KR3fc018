body:
  text: 之以通徑除之所得爲輞外周弦差以減外周餘卽通弦內減池弦餘半之卽慱徑合問如像招數五問今有官司差夫一千八百六十四人築堤只云初日差六十四人次日轉多七人每人日支米三升共支米四百三石九斗二升問築堤幾日答曰一十六日術曰立天元一爲茭草底子如積求之得一千八百爲益實六十七半爲従方三半爲従隅平
