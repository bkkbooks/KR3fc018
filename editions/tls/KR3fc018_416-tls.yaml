body:
  text: 上㢘一十四為従下㢘三為従偶三椉方開之得每靣底子合問今有四角果子一所直錢一貫三百六十五文只云底子每箇直錢一文次上層層每箇累貴二文問底子每靣幾何答曰九箇術曰立天元一為每靣底子如積求之得八千一百九十為益實一為従方二為従上㢘二為従二㢘一為正隅三椉方開之合問今有四角落一形果子積五百四十箇問底子幾何
