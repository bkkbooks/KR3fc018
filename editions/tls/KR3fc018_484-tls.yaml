body:
  text: 相减餘以子乗之加上三之四而一所得為實以分母自之為法實如法而一不盡約之命分三之即三池積合問方方程正負八問今有絲二百七十三兩織錦七匹織綾一匹又絲二百四十七兩織綾八匹織紬一匹又絲二百四十二兩織紬九匹織錦一匹其錦匹長自乗內减綾匹長餘又自乗內加紬匹長共得三十五萬八十八百二十九尺綾
