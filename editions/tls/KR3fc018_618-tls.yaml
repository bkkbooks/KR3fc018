body:
  text: 為正實一百一十二為益方四十一為益隅立方開之得四步合問今有一數不知多少但言五較各自乘並之爲正實以三為益方一為従上亷一爲從下亷二為益隅三乘方開之與其數相等只云句股和羃减二直積加三相和與其數羃自乗併弦羃減股相同又云半之三相和加黃方與其數再自乗亦等問元數幾何答曰二步
