body:
  text: 求之得六十六萬五千二百八十為益實一百二十為従方二百七十四為従上㢘二百二十五為従二㢘八十五為従三㢘一十五為従四㢘一為正隅五椉方開之合問今有圎錐果子積九百三十二箇問髙幾層答曰一十五層術曰立天元一為層数如積求之得七千四百五十五為益實二為従方三為従㢘二為従隅立方開之合問今有三角臺果子積五百四箇只云上下靣底
