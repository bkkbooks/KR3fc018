body:
  text: 荅曰周三十六步徑一十六步術曰立天元一為上周如積求之得一萬二千八百一千六為正實四千七十二為従方二百三十一為益㢘三為正隅立方開之得上周合問今有畹田積加下周幂少半減逡畹徑幂太半餘二千七百九十五步弱半步只云下周為實二為従方一為従隅平方開之又畹徑減二餘以平方開之少如先開方數二步問周徑幾何
