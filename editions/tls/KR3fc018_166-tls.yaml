body:
  text: 六為從二亷九十六為益下亷四為從隅四乗方開之得倉闊又立天元一為囤周如積求之得二千三百萬一百一十二為益實三百八十六萬三千三百四十為從方二十六萬三百五十二為益上亷八千七百七十六為從二亷一百四十八為益下亷一為正隅四乗方開之得囤周又立天元一為囤髙如積求之得二百三十萬二千九百九十二為正實六十萬八百七十六為益方六萬三千三百六十為從上亷三千四百為益二亷九十二為從下亷一為益隅
