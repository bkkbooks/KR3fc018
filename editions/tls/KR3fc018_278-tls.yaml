body:
  text: 術曰立天元一爲弦和和如積求之得一百九十二爲益實一百二十八爲益方二十四爲従亷一爲益隅立方開之合問今有直積一百二十歩只云黃方乗句股較得四十二歩問句及黃方各幾何答曰句八歩黃方六歩術曰立天元一爲句如積求之得二萬八百爲正實五百一十七爲益上亷三爲從隅三乗方開之得句又立天元一爲黄方如積求之得五萬五百四十四爲正實一千四百四十爲益
