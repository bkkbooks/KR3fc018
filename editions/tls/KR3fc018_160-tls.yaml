body:
  text: 髙等又囤徑取中半自乘加三尺却與倉深同倉方多扵囤徑二尺問倉囤髙深方徑各幾何答曰倉方一丈深一丈九尺圓徑八尺髙一丈八尺術曰立天元一為倉半方面如積求之得一萬二千二十五為益实二百一十為從方二十六為益上亷六十二為益下亷三十一為從隅三乗方開之得半方倉面合問今有粟一千九十六斛八斗用倉囤各一貯之不
