body:
  text: 隅三乗方開之得平合問今有直積加平與二和一較等只云長羃减較羃亦與二和一較等問四事各幾何答曰平三步長四步術曰立天元一為平地元一為長天地配合求之得三為正實二為従方一為益隅平方開之得平又立天元一為長地元一為平求得一十二為益實三為従方開無隅平方而一得長又立天元一為和地元一為平求得七為正實六為從方一為益隅平方開之得和又立
