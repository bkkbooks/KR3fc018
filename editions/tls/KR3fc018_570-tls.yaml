body:
  text: 今有直積减小平加大較小和多積五步只云二大和减小長大平少積五步問長平各幾何答曰平三步長六步術曰立天元一為平地元一為長天地配合求之得一十五為益實二為從方一為從隅平方開之得平合問今有直積平方開之减平餘有三步只云長以平方開之不及較三步問長平各幾何答曰平九步長一十六步
