body:
  text: 術曰立天元一為平方面如積求之得二百六十五為益寔一爲正隅平方開之不盡命分合問今有平方靣一十六尺一十一分尺之三問爲平羃幾何答曰二百六十五尺術曰立天元一為平羃如積求之得三萬二千六十五為益寔一百二十一為従方上寔下法今有立羃五百七十四尺問爲立方面幾何答曰八尺七分尺之二術曰立天元一爲立方面如積求之得五百七
