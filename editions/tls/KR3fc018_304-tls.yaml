body:
  text: 四歩八分遙望城西北隅適與西表末相參合問城方去表去城各幾何答曰城方六里三百四十歩去表一十里八十五歩五分歩之一術曰立天元一爲城方如積求之得五千為正實二爲邑益方上實下法而一得城方求表去城者入索乗北行去表以兩表相去除之得數爲景差內减東去表餘以爲法又北行去表內减景差餘乗東表退行爲實實如法而一即表法去城之遠合問
