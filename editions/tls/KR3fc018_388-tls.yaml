body:
  text: 立天元一爲乙截矢如積求之得六十爲益實一十六爲従方一爲益隅平方開之得乙截矢今有大小圎田各一段共地六畞六十四分畞之六十一只云小圎徑如大圎徑八分之五今於二圎従邉各截一弧共積二百二十二步半其小弧矢不及大弧矢三步問二弧矢各幾何答曰截大弧矢八步截弦三十二步截小弧矢五步截弦二十步術曰立天元一爲大圎徑如積求之得
