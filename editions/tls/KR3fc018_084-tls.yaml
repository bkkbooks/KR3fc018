body:
  text: 荅曰二步術曰立天元一為黄方如積求之得二百為益實一百為従方二為従㢘一為益隅立方開之得黄方合問今有積加平幂減長幂以平幂椉之減和幂餘不及積幂八千四百六十步只云長平較三步問長平各㡬何答曰平九步長一十二步術曰立天元一為長如積求之得八千五百三十二為正實一百二十三為益方五十九為従
