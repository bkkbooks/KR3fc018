body:
  text: 今有方田一段靠東北角有圎池占之餘積一萬二百二十五步只云従田西南隅斜至池楞五十九步問田方池徑各幾何答曰池徑一百二十步田方一百四十五步術曰立天元一為池徑如積求之得五十五萬二千為益實四千七百二十為従方一為益隅平方開之合問今有圎田一段周一百二十步被水従中穿為直河分為弧田二段只云二弧弦各
