body:
  text: 答曰甲三層乙四層丙九層術曰立天元一為丙分層数如積求之得一千七百一十九為益實二為従方三為従㢘二為従隅立方開之得丙分層数又立天元一為乙丙共分層数如積求之得四千九百二十七為益實二為従方三為従㢘二為従隅立方開之得一十三層內減丙分層数餘即乙分層数又立天元一為共髙層数如積求之得八千九百九十二為益實二為従方三為従㢘二為従隅立方開之得共髙一十六層內減乙丙層
