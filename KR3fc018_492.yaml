body:
  text: 術曰先以合分法求之次如方程正負術入之左行得米中行得麥右行得豆又三色斗價如前術求之得二貫八十八文即三色共價立天元一為米斗價如積求之得八百六十四為正實一十二為益方上實下法而一得米斗價七十二文又立天元一為麥斗價如積求之得七百六十八為正實一十二為益方開無隅平方而一得麥斗價六十四文又立天元一為豆斗價如積求之得五百五十二為益實一十二為從方上實下法而一得豆斗價合問
