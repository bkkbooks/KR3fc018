body:
  text: 開方數二分之一每日用徒一十九人限一十二日役畢每人日程常積三十二尺問臺髙及上下周各得幾何羅有得字答曰上周四丈八尺下周七丈二尺髙二丈四尺術曰立天元一為開方數如積求之得一十三萬一千三百二十八為益實二十八為從二亷八為益三亷一為正隅四乘方開之得十二為開方數倍之即髙餘依加减求之合問今有造方臺一所共支功食錢二百五十七貫六百二十二文七分文之六尺云以臺
