body:
  text: 數一而巳一者萬物之所從始故易一太極也一而二二而四四而八生生不窮者豈非自然而然之數邪河洛圖書泄其祕黃帝九章著之書其章有九而其數則二百四十有六始方田終句股包括三才旁通萬有凡言數者皆莫得而逃焉如曆之大衍書之曆象詩之萬億及秭記禮之三千三百周官之三百六十數之見于經者蓋不特黃帝九章為然也自後世明算之科不設而此學寖失其傳由是曆法之進退畸盈農田之方圎曲直以至斗升勺合毫釐絲忽
