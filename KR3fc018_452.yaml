body:
  text: 七百四十九為從方四百二十七為從廉二十五為從隅立方開之得內圎徑合問今有圎田一段內有圭池容邉占之只云圭長不及圎徑散步半却多池闊十步半問池長闊及圎徑各幾何答曰池闊二十一步池長三十一步半圎徑三十五步術曰立天元一為池闊如積求之得一百四十七為正實一十四為從方一為益隅平方開之得池闊和問
