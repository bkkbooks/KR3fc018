body:
  text: 今有圎田積加圎徑減圎周餘自椉加徑幂得七千二百步問周圓徑幾何荅曰一十二步術曰立天元一為圎徑如積求之得一十一萬五千二百為益實八十為従上㢘四十八為益下㢘九為正隅三椉方開之得圎徑合問今有窊田積加窊徑強半減上周太半餘一百三十二步只云窊徑以平方開之併入上周共得四十步問周徑各幾何
  hash: sha256:0546058d9eda9c473193bfa08337eb2ef3045f41cfae9211c8419e4b813ff5fb
