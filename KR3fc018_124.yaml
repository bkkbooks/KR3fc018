body:
  text: 今有圎田積加圎徑減圎周餘自乘加徑幂得七千二百步問周圓徑幾何答曰一十二步術曰立天元一為圎徑如積求之得一十一萬五千二百為益實八十為從上廉四十八為益下廉九為正隅三乘方開之得圎徑合問今有窊田積加窊徑強半減上周太半餘一百三十二步只云窊徑以平方開之併入上周共得四十步問周徑各幾何
  hash: sha256:a19d8f81dcf31b8714e94e3f0ff62ecc16da6436bf0cd6c200b069be84287c36
