body:
  text: 答曰平圓徑六尺立圓徑四尺平方靣五尺立方靣三尺術曰先以合分法求之次如方程正負術入之左行得立方積次行得平方積次行得立圓積右行求平圎積併之為共積立天元一為平圎徑如積求之得二千四百八十四為益實七十二為從方三為益亷十為從隅立方開之得平圎徑又立天元一為立圎徑如積求之得三百六十八為益實一十六為從方一為益亷五為正隅立方開之得立圎徑又立天元一
