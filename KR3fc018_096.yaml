body:
  text: 問今有積幂減二長一平餘四萬六千五百七十八步只云平自乘與長等問長平各幾何答曰平六步長三十六步術曰立天元一為平如積求之得四萬六十五百七十八為益實一為益方二為益上廉一為正隅五乘方開之得平合問今有積加一長二平三和四較自乘減一和二較三平四長餘一十五萬五千八百五
