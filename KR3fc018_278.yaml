body:
  text: 術曰立天元一為弦和和如積求之得一百九十二為益實一百二十八為益方二十四為從亷一為益隅立方開之合問今有直積一百二十步只云黃方乘句股較得四十二步問句及黃方各幾何答曰句八步黃方六步術曰立天元一為句如積求之得二萬八百為正實五百一十七為益上亷三為從隅三乘方開之得句又立天元一為黃方如積求之得五萬五百四十四為正實一千四百四十為益
