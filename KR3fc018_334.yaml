body:
  text: 三才相配求之得四百六十爲益實六十爲従方開無餘隅平方而一得句開地元股得四百八十爲益實三十二爲従方上實下法除之得股開人元弦得五百一十爲益實三十爲從方開無隅平方除之得弦合問茭草形段七問今有茭草六百八十朿欲令落一形埵之問底子幾何答曰一十五朿術曰立天元一爲落一底子如積求之得四十千
