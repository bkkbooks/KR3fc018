body:
  text: 三才相配求之得四百六十為益實六十為從方開無餘隅平方而一得句開地元股得四百八十為益實三十二為從方上實下法除之得股開人元弦得五百一十為益實三十為從方開無隅平方除之得弦合問茭草形段七問今有茭草六百八十朿欲令落一形埵之問底子幾何答曰一十五朿術曰立天元一為落一底子如積求之得四十千
