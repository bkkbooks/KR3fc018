body:
  text: 以股除之加句股和以股乗之加股以句除之减二股一句股較與句等只云句乗股羃以股除之加直積减句羃以句除之與弦同問五較連環除弦乗之相和得幾何答曰六步術曰立天元一為句地元一為股人元一為開數三才相配求之得三才十為正實四十一為益方六為正隅平方開之合問今有直積减句股和以句乗之加句股較减直積
