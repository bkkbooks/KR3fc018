body:
  text: 術曰立天元一為股如積求之得九萬七千四百四十為正實八千三百為從方四百六十七為益上廉二十六為益下廉一為正隅三乘方開之得股合問今有梯田積加小闊減大闊餘以小闊乘之得四千一百五十二步只云大闊不及正長九步却多少小闊四步問二闊及長各幾何答曰大闊一十六步小闊十二步正長二十五步
