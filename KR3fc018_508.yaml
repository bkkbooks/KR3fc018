body:
  text: 六步又句弦和三句弦較二股弦較一為共內减股弦和二餘五十五步又股弦和二句弦較一股弦較三為共內减句弦和三餘二十八步問句股弦各幾何答曰句一十二步股三十五步弦三十七步術曰如方程正負術入之左行得股弦次行得句弦較次行得股弦和右行得句弦和立天元一為句如積求之得一百四十四為
