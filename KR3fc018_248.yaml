body:
  text: 答曰圎周三十六步方面一十二步術曰立天元一為開方數如積求之得一萬一百八十八為益實一千八百八十四為徔方一萬四百八十八為從上亷二千七十二為徔二亷二百二十五為徔三亷四百五十為益下亷七十五為益隅五乘方開之得開方數三步四之即方田面合問今有圎田各一假圎徔密率圓田積內加二箇圎田周减一假方田積餘數於上又方田積內加二箇方田靣减一假圎田積
