body:
  text: 術曰立天元一為方箭外周如積求之得四十九萬三千一百三十六為益實三萬一千三百四為益方一千七百四十七為正隅平方開之得方周合問今有方圎箭各一朿共積二百八隻只云圎箭外邊第二層周數與方箭外邊第一層周數同問方圎周各幾何答曰圎周三十六隻方周三十二隻術曰立天元一為圎箭外周如積求之得九千九百三十六為益實二十四為從方七為從隅
