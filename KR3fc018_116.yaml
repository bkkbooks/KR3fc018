body:
  text: 中股幾何答曰八步術曰立天元一為中股如積求之得一億三千三百四十四萬八千七百四為益實七百二萬三千六百一十六為益方八十四萬三千二百九十六為從上廉二十七萬八千七百六十八為從二廉五千三百七十一步七分五釐為從三廉四百九十五為益下廉四十九為益隅五乘方開之得中股合問今有句三股四八角田積以靣開案當做澖三自乘加之却闊
