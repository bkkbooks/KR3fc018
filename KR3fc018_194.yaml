body:
  text: 次日四十一人五分人之三錢三十四貫三百四十九文七分文之五三日八十三人五分人之一錢六十八貫六百九十九文七分文之三末日一百六十六人五分人之二錢一百三十七貫三百九十八文七分文之六術曰立天元一為後開方数如積求之得六千五百五十二為益實三千六百一十為從上亷七百四十一為益三亷七十八為從五亷四為益隅七乘方開之得二尺為後開方数倍之即先開方數四之為䑓上方餘依加减求之每日用徒及錢者如法求之合問和分索隱一十三問
