body:
  text: 上周合問今有圓囤髙一丈二尺周四丈八尺盛粟滿中而適盡只云今已運出三百八十四斛問餘粟殘深幾何答曰殘深七尺術曰立天元一為殘深如積求之得一千八十為益實一百四十四為從方開無隅平方而一得殘深合問今有方倉圓囤各一所貯粟三千三百一十二斛只云倉廣少扵倉長四尺多於倉深二
  hash: sha256:92e8bdc83cc8fff01081a76e67e8a695630e8b2fe8ecb62d1ef562231f7f1ce4
