body:
  text: 半問截句股各幾何答曰截句十五步截股四十五步術曰立天元一為截句如積求之得一二百二十五為益實一為正隅平方開之得截句今有句股田一段股長八十六步句闊二十五步八分今從尖截賣地一百五十三步六分問截長闊各幾何答曰截長三十二步截闊九步六分術曰立天元一為截長如積求之得一千二十四為益實一為正隅平方開之得截長合問
