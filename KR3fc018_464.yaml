body:
  text: 即外田靣闊合問今有圎田一段被水侵入二弧其大弧弦長二十四步小弧弦長一十八步問大小二弧矢各幾何答曰大弧矢六步小弧矢三步術曰立天元一為大弧矢如積求之得一百四十四為益實三十為従方一為益隅平方開之得大弧矢又立天元一為小弧矢如積求之得八十一為正義實三十為益方一為正隅平方開之得小弧矢合問
