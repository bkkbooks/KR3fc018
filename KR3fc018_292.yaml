body:
  text: 之得弦合問句股測望八問今有直邑不知大小各中開門只云南門外二百四十步有塔人出西門行一百八十步見塔復抹邑西南隅行一里二百四十步恰至塔所問邑長闊各幾何答曰長一里一百二十步闊一里術曰立天元一為邑半長如積求之得一十八億六千六百二十四萬為正實一千五百五十五萬二千為從方二十七萬為益上亷四百八
