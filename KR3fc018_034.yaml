body:
  text: 一氣混元今有黄方椉直積得二十四步只云股弦和九步問句幾何答曰三步草曰立天元一為句如積求之得一百六十二箇黄方椉直積式以一百六十二椉元積相消得開方式四椉方開之得句三步合問
