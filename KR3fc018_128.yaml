body:
  text: 答曰周九十九步徑五十一步術曰立天元一為先開方數如積求之得三萬三千八百三十一為益實四百二十為從方二百一十四為益上廉七十四為從下廉一為益隅三乘方開之得九步為先開方數合問今有毬露錢田積加靣徑減圎周餘五十六步只云虛徑多如靣徑二步問三徑各幾何答曰靣徑四步虛徑六步
