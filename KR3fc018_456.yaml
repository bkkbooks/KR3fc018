body:
  text: 長三十二步問水靣闊幾何答曰二十四步術曰立天元一為水靣闊如積求之得五百七十六為益實益為從隅平方開之得水靣闊合問今有方田一段靠西北隅有結角方池占之餘積四千步只云從田東南隅斜至池楞六十八步八分問田池各方幾何答曰池方十五步四方六十五步術曰立天元一為池方如積求之得
