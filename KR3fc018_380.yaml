body:
  text: 四為從上廉二百九十六為從下廉五為益隅三乘方開之得截矢二步自之以減倍積餘以矢除之即弦合問今有圎田一段周二百六十七步今從邊截一弧計積一千三百一十二步中半步問截弦矢各幾何答曰截矢二十五步截弦八十步術曰立天元一為截矢如積求之得六百八十九萬六百二十五為正實五千二百五十為益上廉三百五十六為益下廉五為正隅
