body:
  text: 答曰平八步三分步之二長一十二步四分步之三術曰立天元一為長如積求之得四千一百三十一為益實一十八為從方二十四為從隅平方開之得長不盡按之分法求之合問今有直積加長以平乘之得一千六十八步六分步之一只云二和一長內減三平五較餘九步六分步之一問長平各幾何答曰平八步三分步之二長一十二步四分步之三術曰立天元一為平如積求之得一萬二千八百一十八為益實五十五為益方三十一為益
