body:
  text: 今有句三步十分步之九股五步五分步之一問弦幾何答曰六步二分步之一術曰立天元一為弦如積求之得一十萬五千六百二十五為益實二千五百為從隅平方開之得弦不盡按連枝同體術求之合問今有股五步五分步之一弦六步二分步之一問句幾何答曰三步十分步之九術曰立天元一為句如積求之得一千五百二十一
