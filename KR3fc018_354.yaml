body:
  text: 平方開之得圎周合問撥換截田一十九問今有半種金田一段長五十步斜闊一十步與鄰對撥圭田一段只云併圭田長闊較為正實一十五為益方一為正隅平方開之少如較四步問圭田長闊各幾何答曰長二十五步闊一十六步術曰立天元一為半種金田之中股如積求之得二千四百為正實一百為從方五十為益隅
