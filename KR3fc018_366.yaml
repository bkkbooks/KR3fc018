body:
  text: 四為益實一為正隅平方開之得截長合問今有圭田一段長一百二十步闊四十八步今欲從闊截賣七畞七十五步問截長闊各幾何答曰截長四十五步截闊三十步術曰立天元一為截長如積求之得一千七百五十五為益實四十八為從方二分為益隅平方開之得截長合問今有圭田段長一百七十四步闊五十八步今從東竪截句股積三百三十七步
