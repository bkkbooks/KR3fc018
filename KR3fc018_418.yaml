body:
  text: 答曰八箇術曰立天元一為四角落一底子如積求之得六千四百八十為益實二為從方五為從上廉四為從下廉一為正隅三乘方開之合問今有三角嵐峯形果子積六百三十箇問底子幾何答曰六箇術曰立天元一為三角嵐峯底子如積求之得七萬五千六百為益實六為從方三十五為從上廉五十為從二廉二十五為從三廉四為從隅四乘方開之合問
