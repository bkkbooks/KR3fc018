body:
  text: 答曰八箇術曰立天元一為四角落一底子如積求之得六千四百八十為益實二為従方五為従上㢘四為従下㢘一為正隅三椉方開之合問今有三角嵐峯形果子積六百三十箇問底子幾何答曰六箇術曰立天元一為三角嵐峯底子如積求之得七萬五千六百為益實六為従方三十五為従上㢘五十為従二㢘二十五為従三㢘四為従隅四椉方開之合問
