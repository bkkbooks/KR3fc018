body:
  text: 六乘方開之得二步為開方數合問三率究圎一十四問今有平圎積四十九步三百一十四分步之二百三十九問為徽圎周幾何答曰二十五步術曰立天元一為徽圎周如積求之得一萬五千六百二十五為益實二十五為從隅平方開之合問今有平圎積四十九步三百一十四分步之二百三十九問為徽圎徑幾何
