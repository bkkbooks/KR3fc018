body:
  text: 六乗方開之得二歩為開方數合問三率究圎一十四問今有平圎積四十九歩三百一十四分歩之二百三十九問為徽圎周幾何答曰二十五歩術曰立天元一為徽圎周如積求之得一萬五千六百二十五為益寔二十五為從隅平方開之合問今有平圎積四十九歩三百一十四分歩之二百三十九問為徽圎径幾何
