  text: 通徑一十四步術曰立天元一為靣徑如積求之得一百二十八為益實一十二為益方一十一為正隅以平方開之得靣徑四步合前問今有弧田積加矢立幂減弦平幂餘以矢除之加矢立幂得五千九百一十三步只云矢除弦得四步問弦矢各幾何答曰矢一十八步弦七十二步術曰立天元一為矢如積求之得一步一千八百二十六為益實二十七為益
