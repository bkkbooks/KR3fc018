body:
  text: 隅立方開之即得方箭外周又立天元一為圎箭外周如積求之得二千二百二十萬六千五百二十八為正實三百四十七萬五千五百三十六為益方一十五萬七千一百二十四為従亷一千八百九為益隅立方開之得圎箭外周又立天元一為平圎径如積求之得九億五千二百一十萬四千八百八十八為正實四千二百五十七萬五千三百一十六為益方五十四萬九千九百三十四為従亷一千八百九為益隅立方開之得平圎径又立天元一為
